<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>STAR DIGGERS — ふたりでほって星さがし</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%; overflow:hidden; background:#05060f;
    touch-action:none; -webkit-user-select:none; user-select:none;
    -webkit-tap-highlight-color:transparent; overscroll-behavior:none;
    font-family:-apple-system, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
  }
  #cv { display:block; position:fixed; inset:0; touch-action:none; }
  html:fullscreen, body:fullscreen { width:100%; height:100%; }
</style>
</head>
<body>
<canvas id="cv"></canvas>
<script>
'use strict';

/* ============================================================
   STAR DIGGERS
   画面を上下に分割し、中央のブロック畑を2人で掘って
   隠れたスターを探す協力ゲーム。
   - 自分側のゾーンをドラッグ → 機体が指に追従
   - 触れている間は自動連射（同時タップは pointerId で独立管理）
   - 掘るほどチャージが溜まり、満タンで一気に貫通する大ビーム
============================================================ */

const cv  = document.getElementById('cv');
const ctx = cv.getContext('2d');

let W = 0, H = 0, DPR = 1;
const Z = { top:{y0:0,y1:0}, bot:{y0:0,y1:0}, cy:0 };

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  // 必ずレイアウトビューポートを使う。visualViewport はピンチ操作で縮むため、
  // それに合わせてキャンバスを作り直すと clientX/clientY と座標系がずれて操作不能になる。
  const de = document.documentElement;
  W = Math.round(window.innerWidth  || de.clientWidth);
  H = Math.round(window.innerHeight || de.clientHeight);
  cv.width  = Math.round(W * DPR);
  cv.height = Math.round(H * DPR);
  cv.style.width  = W + 'px';
  cv.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

  Z.top.y0 = H * 0.10;  Z.top.y1 = H * 0.35;
  Z.bot.y0 = H * 0.65;  Z.bot.y1 = H * 0.90;
  Z.cy = H / 2;
  // 全画面ボタンは中央帯の右端＝どちらのプレイヤーの操作エリアにも掛からない位置
  FS.btn.x = W - 36;
  FS.btn.y = Z.cy;

  // ミュートは全画面ボタンと対になる左端中央へ。ポーズはその上に並べる
  AU.btn.x = 36;
  AU.btn.y = Z.cy;
  PAUSE.btn.x = 36;
  PAUSE.btn.y = Z.cy - 66;

  updateRect();
  makeStars();
  for (const p of G.players) clampPlayer(p);
  if (G.mode !== 'title' && FIELD.cell) makeField(G.stage);   // 画面サイズが変わったら畑を作り直す
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 200));
// キャンバスの実表示位置。ページが拡大・スクロールされても入力座標を正しく戻すために使う
const rect = { left: 0, top: 0, sx: 1, sy: 1 };
function updateRect() {
  const r = cv.getBoundingClientRect();
  if (!r.width || !r.height) return;
  rect.left = r.left; rect.top = r.top;
  rect.sx = W / r.width; rect.sy = H / r.height;
}
// ピンチで拡大されてもキャンバスは作り直さず、座標の変換だけ追従させる
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', updateRect);
  window.visualViewport.addEventListener('scroll', updateRect);
}
const localX = (e) => (e.clientX - rect.left) * rect.sx;
const localY = (e) => (e.clientY - rect.top)  * rect.sy;

/* ---------------- ポーズ ---------------- */
const PAUSE = { btn: { x:0, y:0, r:26 } };

function setPaused(on) {
  if (on && G.mode === 'play') {
    G.mode = 'pause';
    releaseAllPointers();      // 指を離した状態にしておく（再開時の暴発防止）
  } else if (!on && G.mode === 'pause') {
    G.mode = 'play';
  }
}

/* ---------------- 全画面 ---------------- */
const FS = {
  supported: !!(document.documentElement.requestFullscreen ||
                document.documentElement.webkitRequestFullscreen),
  btn: { x:0, y:0, r:26 },
};

function isFullscreen() {
  return !!(document.fullscreenElement || document.webkitFullscreenElement);
}

function enterFullscreen() {
  const el = document.documentElement;
  const fn = el.requestFullscreen || el.webkitRequestFullscreen;
  if (!fn) return;
  try {
    // ブラウザによっては Promise を返さないので包んで握り潰す
    Promise.resolve(fn.call(el, { navigationUI: 'hide' })).then(lockOrientation, () => {});
  } catch (_) { /* ユーザー操作外の呼び出しなどは無視 */ }
}

function exitFullscreen() {
  const fn = document.exitFullscreen || document.webkitExitFullscreen;
  if (!fn) return;
  try { Promise.resolve(fn.call(document)).catch(() => {}); } catch (_) {}
}

function toggleFullscreen() { isFullscreen() ? exitFullscreen() : enterFullscreen(); }

function lockOrientation() {
  // 対応端末でのみ縦向き固定（非対応でも例外を出さない）
  try {
    const so = screen.orientation;
    if (so && so.lock) Promise.resolve(so.lock('portrait')).catch(() => {});
  } catch (_) {}
}

for (const ev of ['fullscreenchange', 'webkitfullscreenchange']) {
  document.addEventListener(ev, () => { resize(); setTimeout(resize, 120); });
}

/* ============================================================
   サウンド（Web Audio による合成 / 音源ファイル不要）
   波形を都度生成するので外部リクエストは一切発生しない。
============================================================ */
const AU = {
  supported: !!(window.AudioContext || window.webkitAudioContext),
  ctx: null, master: null, sfxBus: null, bgmBus: null, noise: null,
  muted: false,
  btn: { x:0, y:0, r:26 },
};

function audioInit() {
  if (AU.ctx || !AU.supported) return;
  const C = window.AudioContext || window.webkitAudioContext;
  AU.ctx = new C();

  // 同時発音が重なっても歪まないよう、出力前に軽く潰す
  const comp = AU.ctx.createDynamicsCompressor();
  comp.threshold.value = -14; comp.ratio.value = 12;
  comp.attack.value = 0.003; comp.release.value = 0.15;

  AU.master = AU.ctx.createGain(); AU.master.gain.value = AU.muted ? 0 : 0.9;
  AU.sfxBus = AU.ctx.createGain(); AU.sfxBus.gain.value = 0.55;
  AU.bgmBus = AU.ctx.createGain(); AU.bgmBus.gain.value = 0.28;
  AU.sfxBus.connect(comp); AU.bgmBus.connect(comp);
  comp.connect(AU.master); AU.master.connect(AU.ctx.destination);

  // ホワイトノイズは1本作って使い回す
  const len = Math.floor(AU.ctx.sampleRate * 0.6);
  const buf = AU.ctx.createBuffer(1, len, AU.ctx.sampleRate);
  const ch = buf.getChannelData(0);
  for (let i = 0; i < len; i++) ch[i] = Math.random() * 2 - 1;
  AU.noise = buf;

  BGM.nextTime = AU.ctx.currentTime;
}

// 自動再生制限があるので、必ずユーザー操作の中から呼ぶ
function audioResume() {
  audioInit();
  if (AU.ctx && AU.ctx.state === 'suspended') AU.ctx.resume().catch(() => {});
}

function setMuted(m) {
  AU.muted = m;
  if (AU.master) AU.master.gain.setTargetAtTime(m ? 0 : 0.9, AU.ctx.currentTime, 0.02);
}

document.addEventListener('visibilitychange', () => {
  if (!AU.ctx) return;
  if (document.hidden) AU.ctx.suspend().catch(() => {});
  else if (!AU.muted) AU.ctx.resume().catch(() => {});
});

/* --- 音を鳴らす最小プリミティブ --- */
function tone(o) {
  if (!AU.ctx || AU.muted) return;
  const t = AU.ctx.currentTime + (o.delay || 0);
  const osc = AU.ctx.createOscillator();
  const g = AU.ctx.createGain();
  osc.type = o.type || 'square';
  osc.frequency.setValueAtTime(o.f, t);
  if (o.f2) osc.frequency.exponentialRampToValueAtTime(Math.max(20, o.f2), t + o.dur);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(o.vol, t + (o.atk || 0.006));
  g.gain.exponentialRampToValueAtTime(0.0001, t + o.dur);
  osc.connect(g); g.connect(o.bus || AU.sfxBus);
  osc.start(t); osc.stop(t + o.dur + 0.03);
}

function noiseBurst(o) {
  if (!AU.ctx || AU.muted) return;
  const t = AU.ctx.currentTime + (o.delay || 0);
  const src = AU.ctx.createBufferSource(); src.buffer = AU.noise;
  const f = AU.ctx.createBiquadFilter();
  f.type = o.filter || 'lowpass';
  f.frequency.setValueAtTime(o.f, t);
  if (o.f2) f.frequency.exponentialRampToValueAtTime(Math.max(40, o.f2), t + o.dur);
  const g = AU.ctx.createGain();
  g.gain.setValueAtTime(o.vol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + o.dur);
  src.connect(f); f.connect(g); g.connect(o.bus || AU.sfxBus);
  src.start(t); src.stop(t + o.dur + 0.03);
}

// 高頻度で鳴る音は間引かないと音が濁り、発振器も無駄に増える
const _lastPlay = {};
function throttled(key, ms, fn) {
  const n = performance.now();
  if (_lastPlay[key] && n - _lastPlay[key] < ms) return;
  _lastPlay[key] = n;
  fn();
}

const SFX = {
  shot(idx) {
    throttled('shot' + idx, 55, () =>
      tone({ f: idx ? 900 : 760, f2: idx ? 430 : 360, type:'square', dur:0.07, vol:0.05 }));
  },
  beam() {
    tone({ f:180, f2:1500, type:'sawtooth', dur:0.45, vol:0.20 });
    noiseBurst({ f:500, f2:5000, dur:0.4, vol:0.14, filter:'bandpass' });
  },
  blockHit() {                                   // ブロックを削る音
    throttled('bhit', 55, () => noiseBurst({ f:1400, f2:600, dur:0.05, vol:0.10 }));
  },
  blockBreak() {                                 // ブロックが割れる音
    throttled('bbreak', 40, () => {
      noiseBurst({ f:2400, f2:300, dur:0.22, vol:0.26 });
      tone({ f:320, f2:150, type:'square', dur:0.12, vol:0.09 });
    });
  },
  bomb() {
    noiseBurst({ f:1800, f2:60, dur:0.7, vol:0.5 });
    tone({ f:140, f2:35, type:'square', dur:0.5, vol:0.24 });
  },
  near() {                                       // スターが近いことを知らせる小さな音
    throttled('near', 220, () => tone({ f:1180, f2:1560, type:'triangle', dur:0.12, vol:0.10 }));
  },
  starFound() {                                  // 掘り当てた瞬間
    [784, 988, 1319].forEach((f, i) =>
      tone({ f, type:'triangle', dur:0.24, vol:0.20, delay:i * 0.06 }));
  },
  starGet() {                                    // 回収した瞬間
    [523, 659, 784, 1047, 1319].forEach((f, i) =>
      tone({ f, type:'triangle', dur:0.26, vol:0.20, delay:i * 0.065 }));
  },
  clear() {
    [523, 659, 784, 1047].forEach((f, i) =>
      tone({ f, type:'square', dur:0.34, vol:0.17, delay:i * 0.13 }));
    noiseBurst({ f:6000, f2:1000, dur:0.5, vol:0.10, filter:'highpass', delay:0.5 });
  },
  stage() {
    [392, 523, 659].forEach((f, i) =>
      tone({ f, type:'triangle', dur:0.28, vol:0.16, delay:i * 0.09 }));
  },
  ui() { tone({ f:620, f2:930, type:'triangle', dur:0.08, vol:0.13 }); },
};

/* --- BGM：16ステップのシーケンスを先読みしながら組み立てる --- */
const BGM = {
  nextTime: 0,
  step: 0,
  arp:  [0, 7, 3, 10, 5, 7, 3, 12, 0, 7, 3, 10, 8, 7, 5, 3],
  bass: [1, 0, 0, 0, 1, 0, 1, 0, 1, 0, 0, 0, 1, 0, 1, 1],
};

function bgmUpdate() {
  if (!AU.ctx || AU.muted || G.mode !== 'play') return;
  const tempo = Math.min(150, 98 + G.stage * 4);
  const stepDur = 60 / tempo / 4;                 // 16分音符
  const now = AU.ctx.currentTime;
  if (BGM.nextTime < now) BGM.nextTime = now;     // タブ復帰などで大きく遅れた場合
  while (BGM.nextTime < now + 0.25) {             // 0.25秒先まで先読みして予約
    bgmStep(BGM.step, BGM.nextTime, stepDur);
    BGM.step = (BGM.step + 1) % 16;
    BGM.nextTime += stepDur;
  }
}

function bgmStep(s, t, dur) {
  const d = t - AU.ctx.currentTime;
  if (d < 0) return;
  const root = 55 * Math.pow(2, ((G.stage - 1) % 5) * 2 / 12);   // ステージごとに少しずつ上へ

  if (BGM.bass[s]) {
    tone({ f: root, type:'square', dur: dur * 1.9, vol: 0.22, delay: d, bus: AU.bgmBus });
  }
  if (s % 2 === 0) {
    tone({ f: root * 4 * Math.pow(2, BGM.arp[s] / 12), type:'triangle',
           dur: dur * 1.3, vol: 0.09, delay: d, bus: AU.bgmBus });
  }
  noiseBurst({ f: 7000, dur: 0.03, vol: s % 4 === 2 ? 0.05 : 0.022,
               filter:'highpass', delay: d, bus: AU.bgmBus });
}

/* ============================================================
   ステージ設定
   序盤は子供でも掘り切れる量にし、進むほど硬いブロックと
   スターの数が増える。
============================================================ */
function stageSetup(n) {
  return {
    stars: Math.min(2 + Math.floor((n - 1) / 2), 5),   // 隠されたスターの数
    hardRate: Math.min(0.05 + (n - 1) * 0.05, 0.30),   // かたいブロックの割合
    bombRate: Math.min(0.03 + (n - 1) * 0.02, 0.12),   // ばくだんブロックの割合
    rows: 5,
  };
}

/* ---------------- 自機のサイズと指との位置関係 ---------------- */
const SHIP = {
  scale: 1.8,     // 見た目の拡大率
  hit: 17,        // 当たり判定の半径（見た目より小さめ＝弾幕ゲーの定石）
  edgeY: 46,      // 画面の上下端の不可侵帯。ホームバーや通知シェードを引っぱらせない
  edgeX: 26,      // 同じく左右端（戻るジェスチャ対策）
  gap: 64,        // 指と機体の最小距離。これ未満だと指で機体が隠れる
};

/* ---------------- utils ---------------- */
const rand  = (a, b) => a + Math.random() * (b - a);
const clamp = (v, a, b) => v < a ? a : (v > b ? b : v);
const TAU = Math.PI * 2;

/* ---------------- 背景の星 ---------------- */
let stars = [];
function makeStars() {
  stars = [];
  const n = Math.round((W * H) / 9000);
  for (let i = 0; i < n; i++) {
    stars.push({ x: rand(0, W), y: rand(0, H), r: rand(0.4, 1.6), s: rand(4, 26), a: rand(0.25, 0.9) });
  }
}

/* ---------------- ゲーム状態 ---------------- */
const G = {
  mode: 'title',          // title | play | pause | clear
  t: 0,
  stage: 1,
  score: 0,
  players: [],
  bullets: [],            // プレイヤー弾
  gems: [],               // 掘り出されたスター
  parts: [],
  starsFound: 0,
  starsTotal: 0,
  nextT: 0,               // 次のステージまでの秒数
  stageT: 0,              // このステージの経過時間
  shake: 0,
  banner: null,           // {text, life}
};

const P_COLORS = [
  { main:'#31e6ff', glow:'#0af', name:'PLAYER 1' },   // 下側
  { main:'#ff5cc8', glow:'#f0a', name:'PLAYER 2' },   // 上側
];

function makePlayer(idx) {
  const bottom = idx === 0;
  return {
    idx,
    bottom,
    dirY: bottom ? -1 : 1,               // 弾の進行方向
    x: W / 2,
    y: bottom ? (Z.bot.y0 + Z.bot.y1) / 2 : (Z.top.y0 + Z.top.y1) / 2,
    tx: W / 2, ty: 0,
    fx: 0, fy: 0,                        // 指の実座標
    charge: 0, maxCharge: 100,
    dug: 0,                              // 掘ったブロック数
    stars: 0,                            // 見つけたスターの数
    cool: 0,
    firing: false,
    pointer: -1,
    stack: [],                           // その側に触れている指（最初の1本が操作中）
  };
}

function clampPlayer(p) {
  const z = p.bottom ? Z.bot : Z.top;
  const m = 20 * SHIP.scale;             // 機体が画面端からはみ出さない余白
  p.x = clamp(p.x, m, W - m);
  p.y = clamp(p.y, z.y0, z.y1);
  p.tx = clamp(p.tx, m, W - m);
  p.ty = clamp(p.ty, z.y0, z.y1);
}

/* 指の位置から機体の目標位置を決める。
   指より敵側にずらすことで、機体が指の下に隠れないようにする。 */
// 指が届く範囲を、機体が動ける範囲へそのまま写像する。
//
// 「指の位置から一定量ずらす」方式だと、機体を自分の陣地の端まで動かすのに
// 指を画面外へ出す必要があり、しかも画面の上下端は端末のシステムジェスチャ
// 領域なので操作が OS に奪われてしまう。指の可動範囲そのものを陣地に対応
// させることで、画面端に触れなくても隅々まで届き、かつ機体は常に指より
// 敵側（＝指に隠れない位置）に来る。
function aimFromFinger(p, cx, cy) {
  if (!isFinite(cx) || !isFinite(cy)) return;   // NaN が入ると機体が消える
  p.fx = cx; p.fy = cy;
  const z = p.bottom ? Z.bot : Z.top;

  // 指の可動範囲。機体が必ず指より敵側に来るよう、陣地の手前に gap を確保する
  const gap = SHIP.gap;
  const f0 = p.bottom ? z.y0 + gap  : SHIP.edgeY;
  const f1 = p.bottom ? H - SHIP.edgeY : z.y1 - gap;
  const t  = f1 > f0 ? clamp((cy - f0) / (f1 - f0), 0, 1) : 0;
  p.ty = z.y0 + t * (z.y1 - z.y0);

  const m  = 20 * SHIP.scale;
  const u  = clamp((cx - SHIP.edgeX) / Math.max(1, W - SHIP.edgeX * 2), 0, 1);
  p.tx = m + u * (W - m * 2);

  clampPlayer(p);
}

/* ============================================================
   ブロック畑
   中央帯を格子状のブロックで埋め、いくつかのブロックの中に
   スターを隠す。プレイヤーは上下から掘り進めてスターを探す。
============================================================ */
const B_NORMAL = 0, B_HARD = 1, B_BOMB = 2;
const FIELD = { x0:0, y0:0, cell:0, cols:0, rows:0, grid:[] };

function idxAt(c, r) { return r * FIELD.cols + c; }
function blockAt(c, r) {
  if (c < 0 || r < 0 || c >= FIELD.cols || r >= FIELD.rows) return null;
  return FIELD.grid[idxAt(c, r)];
}
function cellCenter(c, r) {
  return { x: FIELD.x0 + (c + 0.5) * FIELD.cell, y: FIELD.y0 + (r + 0.5) * FIELD.cell };
}

function makeField(stage) {
  const S = stageSetup(stage);
  const bandY0 = Z.top.y1 + H * 0.012;
  const bandY1 = Z.bot.y0 - H * 0.012;
  const cell = Math.max(28, (bandY1 - bandY0) / S.rows);
  // 畑は機体が届く範囲だけに敷く。はみ出すと端の列が永久に掘れなくなる
  const inset = 20 * SHIP.scale;
  const cols = Math.max(4, Math.floor((W - inset * 2) / cell));

  FIELD.cell = cell;
  FIELD.rows = S.rows;
  FIELD.cols = cols;
  FIELD.x0 = (W - cols * cell) / 2;
  FIELD.y0 = bandY0;
  FIELD.grid = new Array(cols * S.rows);

  for (let i = 0; i < FIELD.grid.length; i++) {
    const rnd = Math.random();
    const type = rnd < S.hardRate ? B_HARD : (rnd < S.hardRate + S.bombRate ? B_BOMB : B_NORMAL);
    FIELD.grid[i] = {
      type,
      hp: type === B_HARD ? 70 : 24,
      maxHp: type === B_HARD ? 70 : 24,
      star: false,
      flash: 0,
    };
  }

  // スターを重複なく隠す。上下の端の列は序盤で当たりやすいので避ける
  const pool = [];
  for (let r = 0; r < S.rows; r++) {
    for (let c = 0; c < cols; c++) {
      const b = FIELD.grid[idxAt(c, r)];
      if (b.type !== B_BOMB) pool.push(idxAt(c, r));
    }
  }
  let placed = 0;
  while (placed < S.stars && pool.length) {
    const k = Math.floor(rand(0, pool.length));
    FIELD.grid[pool[k]].star = true;
    pool.splice(k, 1);
    placed++;
  }
  G.starsTotal = placed;
  G.starsFound = 0;
}

// ブロックを壊す。スター入りならスターを出し、ばくだんなら周囲を巻き込む
function breakBlock(c, r, ownerIdx, depth) {
  const b = blockAt(c, r);
  if (!b) return;
  FIELD.grid[idxAt(c, r)] = null;
  const pos = cellCenter(c, r);
  G.score += 10;
  if (ownerIdx >= 0 && G.players[ownerIdx]) G.players[ownerIdx].dug++;

  if (b.type === B_BOMB) {
    SFX.bomb();
    G.shake = Math.max(G.shake, 14);
    burst(pos.x, pos.y, '#ff8a3c', 26, 340, 7);
    if ((depth || 0) < 3) {
      for (let dc = -1; dc <= 1; dc++) for (let dr = -1; dr <= 1; dr++) {
        if (dc || dr) breakBlock(c + dc, r + dr, ownerIdx, (depth || 0) + 1);
      }
    }
  } else {
    SFX.blockBreak();
    burst(pos.x, pos.y, b.type === B_HARD ? '#c9d2e0' : '#7fb2ff', 12, 200, 5);
  }

  if (b.star) {
    // 見せてから自動で回収する。ブロックに阻まれて撃てず詰まるのを防ぐ
    G.gems.push({ x: pos.x, y: pos.y, r: FIELD.cell * 0.30, t: rand(0, 6),
                  taken: false, life: 0.9, owner: ownerIdx >= 0 ? ownerIdx : 0 });
    SFX.starFound();
    burst(pos.x, pos.y, '#ffd54a', 30, 300, 7);
    G.banner = { text: 'スターはっけん！', life: 1.4 };
  } else {
    // 近くにスターがあれば光の粒でそっと知らせる
    let near = false;
    for (let dc = -1; dc <= 1 && !near; dc++) {
      for (let dr = -1; dr <= 1 && !near; dr++) {
        const n = blockAt(c + dc, r + dr);
        if (n && n.star) near = true;
      }
    }
    if (near) { burst(pos.x, pos.y, '#ffd54a', 7, 90, 3); SFX.near(); }
  }
}

function damageBlock(c, r, dmg, ownerIdx) {
  const b = blockAt(c, r);
  if (!b) return false;
  b.hp -= dmg;
  b.flash = 1;
  if (b.hp <= 0) breakBlock(c, r, ownerIdx, 0);
  else SFX.blockHit();
  return true;
}

function resetGame() {
  G.stage = 1; G.score = 0; G.t = 0; G.stageT = 0;
  G.bullets.length = 0; G.gems.length = 0; G.parts.length = 0;
  G.players = [makePlayer(0), makePlayer(1)];
  makeField(1);
  G.nextT = 0;
  G.shake = 0;
  G.banner = { text: 'ステージ 1', life: 1.6 };
  pointers.clear();
}

/* ---------------- 入力（マルチタッチ） ---------------- */
/* pointerId -> playerIndex。上下ゾーンで担当プレイヤーを決めるので
   2本の指が同時に押されても互いに干渉しない。 */
const pointers = new Map();

function playerForY(y) { return y > Z.cy ? 0 : 1; }

function onDown(e) {
  e.preventDefault();

  // 各種ボタンは最優先で判定（機体の移動・射撃には渡さない）
  const ex = localX(e), ey = localY(e);
  // 不正値は問答無用で破棄（機体の座標を壊すため）
  if (!isFinite(ex) || !isFinite(ey)) return;
  // 盤面の外側をタップしたらポーズ。操作中の指は横取りさせない。
  const pad = 4;
  if (ex < -pad || ey < -pad || ex > W + pad || ey > H + pad) {
    if (G.mode === 'play') { setPaused(true); SFX.ui(); }
    return;
  }
  const onBtn = (b) => {
    const dx = ex - b.x, dy = ey - b.y, hit = b.r + 10;
    return dx * dx + dy * dy < hit * hit;
  };
  if (onBtn(PAUSE.btn) && (G.mode === 'play' || G.mode === 'pause')) {
    audioResume(); SFX.ui();
    setPaused(G.mode === 'play');
    return;
  }
  if (FS.supported && onBtn(FS.btn)) { audioResume(); SFX.ui(); toggleFullscreen(); return; }
  if (AU.supported && onBtn(AU.btn)) {
    audioResume();
    setMuted(!AU.muted);
    if (!AU.muted) SFX.ui();
    return;
  }

  // 自動再生制限の解除はユーザー操作の中でしかできない
  audioResume();

  // ポーズ中はどこを触っても再開。指の位置で機体が飛ばないよう入力には使わない
  if (G.mode === 'pause') { setPaused(false); return; }

  if (G.mode === 'title') {
    // 最初のタップ＝ユーザー操作なので、ここでしか全画面には入れない
    if (FS.supported && !isFullscreen()) enterFullscreen();
    resetGame(); G.mode = 'play';
    SFX.stage();
    // return せず、この指をそのまま操作に使う（指を置き直さなくて済む）
  }

  const idx = playerForY(ey);
  const p = G.players[idx];
  if (!p) return;

  // 明示的にキャプチャして、指が画面端に出ても追跡が切れないようにする
  try { cv.setPointerCapture(e.pointerId); } catch (_) {}

  pointers.set(e.pointerId, { idx, x: ex, y: ey });
  p.stack.push(e.pointerId);        // 同じ側を複数の指で触っても取りこぼさない

  // 先に触れている指があるなら主導権は渡さない。手のひらや3本目の指が
  // 触れただけで機体が飛ぶのを防ぐ（その指は控えとしてスタックに残る）。
  if (p.pointer !== -1 && pointers.has(p.pointer)) return;

  p.pointer = e.pointerId;
  p.firing = true;
  aimFromFinger(p, ex, ey);
}

function onMove(e) {
  const rec = pointers.get(e.pointerId);
  if (!rec) return;
  e.preventDefault();
  rec.x = localX(e); rec.y = localY(e);
  const p = G.players[rec.idx];
  // 操作中の指だけが機体を動かす（同じ側の他の指は位置だけ覚えておく）
  if (p && p.pointer === e.pointerId) aimFromFinger(p, rec.x, rec.y);
}

function onUp(e) {
  const rec = pointers.get(e.pointerId);
  if (!rec) return;
  e.preventDefault();
  pointers.delete(e.pointerId);
  try { cv.releasePointerCapture(e.pointerId); } catch (_) {}
  const p = G.players[rec.idx];
  if (p) releasePointer(p, e.pointerId);
}

// 指を1本離す。同じ側にまだ触れている指が残っていれば操作を引き継ぐ
function releasePointer(p, id) {
  const i = p.stack.indexOf(id);
  if (i !== -1) p.stack.splice(i, 1);
  const next = p.stack.length ? p.stack[0] : -1;   // 先に触れていた指へ戻す
  p.pointer = next;
  if (next === -1) {
    p.firing = false;
    return;
  }
  p.firing = true;
  const rec = pointers.get(next);
  if (rec) aimFromFinger(p, rec.x, rec.y);
}

// アプリ切り替えなどでイベントを取りこぼしても、押しっぱなし状態を残さない
function releaseAllPointers() {
  pointers.clear();
  for (const p of G.players) { p.stack.length = 0; p.pointer = -1; p.firing = false; }
}

cv.addEventListener('pointerdown',   onDown,  { passive:false });
cv.addEventListener('pointermove',   onMove,  { passive:false });
cv.addEventListener('pointerup',     onUp,    { passive:false });
cv.addEventListener('pointercancel', onUp,    { passive:false });
window.addEventListener('blur', releaseAllPointers);
document.addEventListener('visibilitychange', () => {
  if (document.hidden) { releaseAllPointers(); setPaused(true); }   // 裏に回ったら自動ポーズ
});
cv.addEventListener('contextmenu', e => e.preventDefault());
for (const g of ['gesturestart', 'gesturechange', 'gestureend']) {
  document.addEventListener(g, e => e.preventDefault());
}
document.addEventListener('touchmove', e => e.preventDefault(), { passive:false });

/* ---------------- エフェクト ---------------- */
function burst(x, y, color, n, spd, size) {
  for (let i = 0; i < n; i++) {
    const a = rand(0, TAU), s = rand(spd * 0.3, spd);
    G.parts.push({
      x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
      life: rand(0.25, 0.7), max: 0.7, color, size: rand(size * 0.5, size),
    });
  }
}

/* ---------------- 弾 ---------------- */
function playerShoot(p) {
  const big = p.charge >= p.maxCharge;
  const c = P_COLORS[p.idx];
  const muzzle = p.y + p.dirY * 20 * SHIP.scale;   // 機体の拡大に合わせて発射位置もずらす
  if (big) {
    p.charge = 0;
    // pierceLeft: 貫通できるブロック数。これが無いと一列を丸ごと消してしまう
    G.bullets.push({ x:p.x, y:muzzle, vy: p.dirY*1500, r:20, dmg:110,
                     owner:p.idx, pierce:true, pierceLeft:3, color:c.main });
    burst(p.x, muzzle, c.main, 18, 320, 6);
    SFX.beam();
    G.shake = Math.max(G.shake, 8);
    p.cool = 0.42;
  } else {
    for (const off of [-11 * SHIP.scale, 11 * SHIP.scale]) {
      G.bullets.push({ x:p.x+off, y:muzzle, vy: p.dirY*1150, r:5, dmg:8, owner:p.idx, pierce:false, color:c.main });
    }
    SFX.shot(p.idx);
    p.cool = 0.115;
  }
}

/* ---------------- 更新 ---------------- */
function update(dt) {
  G.t += dt;
  // ポーズ中は星も粒子も含めて完全に止める（表示の点滅のため G.t だけ進める）
  if (G.mode === 'pause') return;

  G.shake *= Math.pow(0.02, dt);
  if (G.banner) { G.banner.life -= dt; if (G.banner.life <= 0) G.banner = null; }

  for (const s of stars) { s.y += s.s * dt; if (s.y > H) { s.y = 0; s.x = rand(0, W); } }

  if (G.mode !== 'play') { updateParts(dt); return; }

  /* --- プレイヤー --- */
  for (const p of G.players) {
    // イベントを取りこぼしても操作不能のまま固まらないよう、毎フレーム突き合わせる
    for (let i = p.stack.length - 1; i >= 0; i--) {
      if (!pointers.has(p.stack[i])) p.stack.splice(i, 1);
    }
    const act = p.stack.length ? p.stack[0] : -1;
    if (act !== p.pointer) {
      p.pointer = act;
      p.firing = act !== -1;
    }

    // 指の位置へ滑らかに追従（そのままだとカクつくので補間）
    if (p.pointer !== -1) {
      const k = 1 - Math.pow(0.0000015, dt);
      p.x += (p.tx - p.x) * k;
      p.y += (p.ty - p.y) * k;
      clampPlayer(p);
    }

    p.cool -= dt;
    if (p.firing && p.cool <= 0) playerShoot(p);
  }

  /* --- ステージ進行 --- */
  G.stageT += dt;
  if (G.nextT > 0) {
    G.nextT -= dt;
    if (G.nextT <= 0) {
      G.nextT = 0;
      G.stage++;
      G.bullets.length = 0;
      makeField(G.stage);
      G.banner = { text: 'ステージ ' + G.stage, life: 1.6 };
      SFX.stage();
    }
  }

  /* --- ブロックの点滅 --- */
  for (const b of FIELD.grid) if (b && b.flash > 0) b.flash = Math.max(0, b.flash - dt * 5);

  /* --- プレイヤー弾 --- */
  for (let i = G.bullets.length - 1; i >= 0; i--) {
    const b = G.bullets[i];
    b.y += b.vy * dt;
    if (b.y < -40 || b.y > H + 40) { G.bullets.splice(i, 1); continue; }

    // スターに当たったら回収
    let hitGem = false;
    for (const g of G.gems) {
      if (g.taken) continue;
      const dx = b.x - g.x, dy = b.y - g.y, rr = g.r + b.r;
      if (dx * dx + dy * dy < rr * rr) { collectGem(g, b.owner); hitGem = true; break; }
    }
    if (hitGem && !b.pierce) { G.bullets.splice(i, 1); continue; }

    // ブロックに当たったら削る
    const c = Math.floor((b.x - FIELD.x0) / FIELD.cell);
    const r = Math.floor((b.y - FIELD.y0) / FIELD.cell);
    const blk = blockAt(c, r);
    if (blk) {
      const p = G.players[b.owner];
      // 通常弾だけがチャージを溜める。ビームで溜まると撃ちっぱなしになる
      if (p && !b.pierce) p.charge = Math.min(p.maxCharge, p.charge + b.dmg * 0.22);
      damageBlock(c, r, b.dmg, b.owner);
      burst(b.x, b.y, b.color, b.pierce ? 8 : 4, b.pierce ? 220 : 130, b.pierce ? 5 : 3);
      if (!b.pierce) { G.bullets.splice(i, 1); continue; }
      if (--b.pierceLeft <= 0) { G.bullets.splice(i, 1); continue; }   // 貫通しきったら消える
    }
  }

  /* --- 掘り出されたスター --- */
  for (let i = G.gems.length - 1; i >= 0; i--) {
    const g = G.gems[i];
    g.t += dt;
    if (!g.taken) {
      g.life -= dt;
      if (g.life <= 0) collectGem(g, g.owner);     // 撃たなくても自動で手に入る
    } else {
      g.take -= dt;
      if (g.take <= 0) G.gems.splice(i, 1);
    }
  }

  updateParts(dt);
  bgmUpdate();
}

function collectGem(g, ownerIdx) {
  if (g.taken) return;
  g.taken = true; g.take = 0.5;
  G.starsFound++;
  G.score += 1000;
  const p = G.players[ownerIdx];
  if (p) { p.stars++; p.charge = p.maxCharge; }
  SFX.starGet();
  burst(g.x, g.y, '#ffd54a', 40, 380, 8);
  G.shake = Math.max(G.shake, 10);

  if (G.starsFound >= G.starsTotal) {
    G.score += 500 * G.stage;
    G.banner = { text: 'ステージ クリア！', life: 2.0 };
    SFX.clear();
    G.nextT = 2.2;
  }
}

function updateParts(dt) {
  for (let i = G.parts.length - 1; i >= 0; i--) {
    const p = G.parts[i];
    p.life -= dt;
    if (p.life <= 0) { G.parts.splice(i, 1); continue; }
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vx *= Math.pow(0.15, dt); p.vy *= Math.pow(0.15, dt);
  }
}

/* ---------------- 描画 ---------------- */
function draw() {
  ctx.save();
  if (G.shake > 0.3) ctx.translate(rand(-G.shake, G.shake), rand(-G.shake, G.shake));

  // 背景
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0,   '#120a22');
  g.addColorStop(0.5, '#05060f');
  g.addColorStop(1,   '#02141f');
  ctx.fillStyle = g; ctx.fillRect(-40, -40, W + 80, H + 80);

  ctx.fillStyle = '#ffffff';
  for (const s of stars) { ctx.globalAlpha = s.a * 0.7; ctx.fillRect(s.x, s.y, s.r, s.r); }
  ctx.globalAlpha = 1;

  drawArena();

  if (G.mode !== 'title') {
    drawField();
    drawGems();
    for (const b of G.bullets) drawBullet(b);
    for (const p of G.players) drawShip(p);
    drawParts();
    drawHUD();
  } else {
    drawParts();
  }

  ctx.restore();

  if (G.mode === 'title') drawTitle();
  if (G.mode === 'pause') drawPauseOverlay();
  if (G.banner) drawBanner(G.banner);
  // オーバーレイに隠れず、画面揺れの影響も受けないよう最後に描く
  drawFsButton();
  drawMuteButton();
  drawPauseButton();
}

function drawArena() {
  // 中央帯（敵ゾーン）
  ctx.save();
  const bandH = H * 0.2;
  const bg = ctx.createLinearGradient(0, Z.cy - bandH, 0, Z.cy + bandH);
  bg.addColorStop(0, 'rgba(255,255,255,0)');
  bg.addColorStop(0.5, 'rgba(90,150,255,0.07)');
  bg.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = bg;
  ctx.fillRect(0, Z.cy - bandH, W, bandH * 2);

  ctx.strokeStyle = 'rgba(255,255,255,0.10)';
  ctx.lineWidth = 1;
  ctx.setLineDash([12, 10]);
  for (const y of [Z.cy - bandH * 0.55, Z.cy + bandH * 0.55]) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  ctx.setLineDash([]);

  // 各プレイヤーの操作可能ゾーン枠
  for (let i = 0; i < 2; i++) {
    const z = i === 0 ? Z.bot : Z.top;
    ctx.strokeStyle = P_COLORS[i].main;
    ctx.globalAlpha = 0.14;
    ctx.lineWidth = 2;
    roundRect(ctx, 14, z.y0 - 12, W - 28, (z.y1 - z.y0) + 24, 18);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
  ctx.restore();
}

function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.arcTo(x + w, y, x + w, y + h, r);
  c.arcTo(x + w, y + h, x, y + h, r);
  c.arcTo(x, y + h, x, y, r);
  c.arcTo(x, y, x + w, y, r);
  c.closePath();
}

function drawShip(p) {
  const c = P_COLORS[p.idx];
  // 指と機体をつなぐガイド（オフセットしていることが直感的にわかるように）
  if (p.pointer !== -1) {
    ctx.save();
    ctx.globalAlpha = 0.28;
    ctx.strokeStyle = c.main;
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 6]);
    ctx.beginPath(); ctx.moveTo(p.fx, p.fy); ctx.lineTo(p.x, p.y); ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 0.22;
    ctx.beginPath(); ctx.arc(p.fx, p.fy, 22, 0, TAU); ctx.stroke();
    ctx.restore();
  }

  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.scale(SHIP.scale, p.bottom ? SHIP.scale : -SHIP.scale);   // 上側プレイヤーは上下反転

  if (p.invuln > 0 && Math.floor(p.invuln * 12) % 2 === 0) ctx.globalAlpha = 0.35;

  // エンジン炎
  const flame = 12 + Math.sin(G.t * 30) * 4;
  const fg = ctx.createLinearGradient(0, 14, 0, 14 + flame);
  fg.addColorStop(0, c.main); fg.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = fg;
  ctx.beginPath(); ctx.moveTo(-7, 14); ctx.lineTo(7, 14); ctx.lineTo(0, 14 + flame); ctx.closePath(); ctx.fill();

  ctx.shadowColor = c.glow; ctx.shadowBlur = 18;
  ctx.fillStyle = p.hitFlash > 0 ? '#fff' : c.main;
  ctx.beginPath();
  ctx.moveTo(0, -20); ctx.lineTo(14, 10); ctx.lineTo(6, 6);
  ctx.lineTo(0, 13);  ctx.lineTo(-6, 6); ctx.lineTo(-14, 10);
  ctx.closePath(); ctx.fill();

  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath(); ctx.arc(0, -4, 3.6, 0, TAU); ctx.fill();

  // チャージ満タンのオーラ
  if (p.charge >= p.maxCharge) {
    ctx.strokeStyle = '#fff';
    ctx.globalAlpha = 0.4 + 0.4 * Math.sin(G.t * 14);
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, 0, 26 + Math.sin(G.t * 10) * 3, 0, TAU); ctx.stroke();
  }
  ctx.restore();
}

function drawField() {
  const cell = FIELD.cell;
  if (!cell) return;
  ctx.save();
  for (let r = 0; r < FIELD.rows; r++) {
    for (let c = 0; c < FIELD.cols; c++) {
      const b = FIELD.grid[idxAt(c, r)];
      if (!b) continue;
      const x = FIELD.x0 + c * cell, y = FIELD.y0 + r * cell;
      const pad = cell * 0.055;
      const w = cell - pad * 2;
      const wear = b.hp / b.maxHp;             // 削れるほど暗く小さくなる

      let base, edge;
      if (b.type === B_HARD)      { base = '#8992a6'; edge = '#c3ccdb'; }
      else if (b.type === B_BOMB) { base = '#9c3140'; edge = '#ff7d6b'; }
      else                        { base = '#2f5f9e'; edge = '#7fb2ff'; }

      ctx.globalAlpha = 0.45 + 0.55 * wear;
      ctx.fillStyle = b.flash > 0 ? '#ffffff' : base;
      roundRect(ctx, x + pad, y + pad, w, w, cell * 0.16);
      ctx.fill();

      ctx.globalAlpha = (0.5 + 0.5 * wear) * 0.9;
      ctx.strokeStyle = edge;
      ctx.lineWidth = 2;
      roundRect(ctx, x + pad, y + pad, w, w, cell * 0.16);
      ctx.stroke();

      if (b.type === B_BOMB) {                 // ばくだんは一目で分かるように
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#ffd7cf';
        ctx.beginPath(); ctx.arc(x + cell / 2, y + cell / 2, cell * 0.13, 0, TAU); ctx.fill();
      } else if (b.type === B_HARD) {          // かたいブロックは鋲を打つ
        ctx.globalAlpha = 0.8;
        ctx.fillStyle = edge;
        for (const [ox, oy] of [[-1,-1],[1,-1],[-1,1],[1,1]]) {
          ctx.beginPath();
          ctx.arc(x + cell / 2 + ox * w * 0.32, y + cell / 2 + oy * w * 0.32, cell * 0.045, 0, TAU);
          ctx.fill();
        }
      }
      ctx.globalAlpha = 1;
    }
  }
  ctx.restore();
}

function drawGems() {
  ctx.save();
  for (const g of G.gems) {
    const pop = g.taken ? 1 + (0.5 - g.take) * 2.4 : 1;
    const a   = g.taken ? Math.max(0, g.take / 0.5) : 1;
    ctx.save();
    ctx.globalAlpha = a;
    ctx.translate(g.x, g.y);
    ctx.rotate(Math.sin(g.t * 1.6) * 0.25);
    ctx.scale(pop, pop);
    ctx.shadowColor = '#ffd54a';
    ctx.shadowBlur = 26 + Math.sin(g.t * 5) * 8;
    ctx.fillStyle = '#ffd54a';
    star5(ctx, g.r);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff6c8';
    star5(ctx, g.r * 0.5);
    ctx.fill();
    ctx.restore();
  }
  ctx.restore();
}

function star5(c, r) {
  c.beginPath();
  for (let i = 0; i < 10; i++) {
    const rr = i % 2 === 0 ? r : r * 0.45;
    const a = -Math.PI / 2 + i * Math.PI / 5;
    c[i ? 'lineTo' : 'moveTo'](Math.cos(a) * rr, Math.sin(a) * rr);
  }
  c.closePath();
}

function drawBullet(b) {
  ctx.save();
  ctx.shadowColor = b.color; ctx.shadowBlur = b.pierce ? 30 : 12;
  ctx.fillStyle = b.color;
  if (b.pierce) {
    ctx.globalAlpha = 0.9;
    ctx.fillRect(b.x - b.r, Math.min(b.y, b.y + b.vy * 0.05), b.r * 2, Math.abs(b.vy * 0.05));
    ctx.fillStyle = '#fff';
    ctx.fillRect(b.x - b.r * 0.35, Math.min(b.y, b.y + b.vy * 0.05), b.r * 0.7, Math.abs(b.vy * 0.05));
  } else {
    ctx.beginPath(); ctx.ellipse(b.x, b.y, b.r * 0.7, b.r * 2.2, 0, 0, TAU); ctx.fill();
  }
  ctx.restore();
}

// ボタンの共通の下地（呼び出し側で ctx.restore() する）
function btnBase(b) {
  ctx.save();
  ctx.translate(b.x, b.y);
  ctx.globalAlpha = G.mode === 'play' ? 0.35 : 0.75;
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath(); ctx.arc(0, 0, b.r, 0, TAU); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.45)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(0, 0, b.r, 0, TAU); ctx.stroke();
}

function drawMuteButton() {
  if (!AU.supported) return;
  btnBase(AU.btn);
  ctx.strokeStyle = '#fff'; ctx.fillStyle = '#fff';
  ctx.lineWidth = 2.2; ctx.lineCap = 'round'; ctx.lineJoin = 'round';

  ctx.beginPath();                                   // スピーカー本体
  ctx.moveTo(-10, -4); ctx.lineTo(-5, -4); ctx.lineTo(1, -10);
  ctx.lineTo(1, 10);   ctx.lineTo(-5, 4);  ctx.lineTo(-10, 4);
  ctx.closePath(); ctx.fill();

  if (AU.muted) {                                    // ×印
    ctx.beginPath();
    ctx.moveTo(6, -6); ctx.lineTo(15, 6);
    ctx.moveTo(15, -6); ctx.lineTo(6, 6);
    ctx.stroke();
  } else {                                           // 音波
    for (const r of [7, 12]) {
      ctx.beginPath();
      ctx.arc(1, 0, r, -Math.PI / 3, Math.PI / 3);
      ctx.stroke();
    }
  }
  ctx.restore();
}

function drawPauseButton() {
  if (G.mode !== 'play' && G.mode !== 'pause') return;
  btnBase(PAUSE.btn);
  ctx.fillStyle = '#fff';
  if (G.mode === 'pause') {                 // 再生（▶）
    ctx.beginPath();
    ctx.moveTo(-6, -10); ctx.lineTo(11, 0); ctx.lineTo(-6, 10);
    ctx.closePath(); ctx.fill();
  } else {                                  // 一時停止（||）
    ctx.fillRect(-8, -10, 5.5, 20);
    ctx.fillRect(3, -10, 5.5, 20);
  }
  ctx.restore();
}

function drawPauseOverlay() {
  ctx.save();
  ctx.fillStyle = 'rgba(3,6,18,0.72)';
  ctx.fillRect(0, 0, W, H);
  for (const flip of [0, 1]) {
    ctx.save();
    ctx.translate(W / 2, flip ? Z.cy - H * 0.20 : Z.cy + H * 0.20);
    if (flip) ctx.rotate(Math.PI);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.shadowColor = '#31e6ff'; ctx.shadowBlur = 22;
    ctx.font = '900 40px system-ui, sans-serif';
    ctx.fillText('PAUSE', 0, -18);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 0.55 + 0.45 * Math.sin(G.t * 4);
    ctx.font = '700 17px system-ui, sans-serif';
    ctx.fillText('タップでつづける', 0, 24);
    ctx.restore();
  }
  ctx.restore();
}

function drawFsButton() {
  if (!FS.supported) return;
  const b = FS.btn, full = isFullscreen();
  btnBase(b);

  // 全画面=外向きの隅アイコン / 解除=内向き
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2.2;
  ctx.lineCap = 'round';
  // 全画面へ: 外側の四隅に枠 / 解除: 中央寄りの隅から外へ伸びる
  const o = full ? 4 : 11, len = 7, inward = full ? -1 : 1;
  for (const sx of [-1, 1]) for (const sy of [-1, 1]) {
    const cx = sx * o, cy = sy * o;
    ctx.beginPath();
    ctx.moveTo(cx - sx * len * inward, cy);
    ctx.lineTo(cx, cy);
    ctx.lineTo(cx, cy - sy * len * inward);
    ctx.stroke();
  }
  ctx.restore();
}

function drawParts() {
  ctx.save();
  for (const p of G.parts) {
    ctx.globalAlpha = Math.max(0, p.life / p.max);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.restore();
}

/* --- HUD --- */
function drawHUD() {
  for (const p of G.players) drawPlayerHUD(p);

  // 中央に進捗（両側から読めるよう2方向に描画）
  for (const flip of [0, 1]) {
    ctx.save();
    ctx.translate(W / 2, Z.cy + (flip ? -1 : 1) * (FIELD.cell * FIELD.rows / 2 + 22));
    if (flip) ctx.rotate(Math.PI);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(255,255,255,0.62)';
    ctx.font = '700 14px system-ui, sans-serif';
    ctx.fillText(`ステージ ${G.stage}   ★ ${G.starsFound} / ${G.starsTotal}   ${G.score}`, 0, 0);
    ctx.restore();
  }
}

function drawPlayerHUD(p) {
  const c = P_COLORS[p.idx];
  const barW = Math.min(W * 0.42, 300);
  const y = p.bottom ? H - 30 : 20;

  ctx.save();
  ctx.translate(W / 2, y);
  if (!p.bottom) ctx.rotate(Math.PI);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  // チャージ（満タンで貫通ビーム）
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  roundRect(ctx, -barW / 2, -3, barW, 6, 3); ctx.fill();
  ctx.fillStyle = p.charge >= p.maxCharge ? '#fff' : c.main;
  roundRect(ctx, -barW / 2, -3, barW * (p.charge / p.maxCharge), 6, 3); ctx.fill();

  ctx.fillStyle = c.main;
  ctx.font = '700 12px system-ui, sans-serif';
  ctx.fillText(`${c.name}   ★${p.stars}   ブロック ${p.dug}`, 0, -16);
  ctx.restore();
}

function drawBanner(b) {
  const a = Math.min(1, b.life * 2.2);
  for (const flip of [0, 1]) {
    ctx.save();
    ctx.globalAlpha = a;
    ctx.translate(W / 2, Z.cy + (flip ? -1 : 1) * H * 0.22);
    if (flip) ctx.rotate(Math.PI);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.shadowColor = '#7cf'; ctx.shadowBlur = 20;
    ctx.font = '800 30px system-ui, sans-serif';
    ctx.fillText(b.text, 0, 0);
    ctx.restore();
  }
}

function drawTitle() {
  ctx.save();
  ctx.fillStyle = 'rgba(3,4,12,0.72)';
  ctx.fillRect(0, 0, W, H);
  for (const flip of [0, 1]) {
    ctx.save();
    ctx.translate(W / 2, flip ? H * 0.27 : H * 0.73);
    if (flip) ctx.rotate(Math.PI);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

    ctx.fillStyle = '#fff';
    ctx.shadowColor = '#31e6ff'; ctx.shadowBlur = 26;
    ctx.font = '900 46px system-ui, sans-serif';
    ctx.fillText('STAR DIGGERS', 0, -46);
    ctx.shadowBlur = 0;

    ctx.fillStyle = 'rgba(255,255,255,0.78)';
    ctx.font = '600 15px system-ui, sans-serif';
    ctx.fillText('まんなかのブロックをこわして ★ をさがそう', 0, 6);
    ctx.fillText('自分のエリアを指でなぞって移動 / さわっている間は連射', 0, 28);
    ctx.fillText('★ の近くを掘ると光の粒が出ます', 0, 50);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText('2人同時プレイ対応 — 上側と下側を別々の指で操作できます', 0, 76);
    ctx.fillText(FS.supported
      ? 'タップで全画面になります（右端のボタンでいつでも切替）'
      : 'ブラウザの「ホーム画面に追加」から起動すると全画面になります', 0, 98);

    ctx.fillStyle = '#fff';
    ctx.globalAlpha = 0.55 + 0.45 * Math.sin(G.t * 4);
    ctx.font = '800 20px system-ui, sans-serif';
    ctx.fillText('TAP TO START', 0, 138);
    ctx.restore();
  }
  ctx.restore();
}

/* ---------------- メインループ ---------------- */
let last = performance.now();
let errCount = 0;
function frame(now) {
  // 何が起きても次のフレームは必ず予約する。
  // ここで例外が抜けると requestAnimationFrame が途切れ、画面が完全に固まるため。
  requestAnimationFrame(frame);

  let dt = (now - last) / 1000;
  last = now;
  if (dt > 0.05) dt = 0.05;      // タブ復帰時の飛びを抑制

  try {
    update(dt);
    draw();
  } catch (err) {
    if (++errCount <= 3) console.error('frame error:', err);
    // 壊れた状態を引きずらないよう、続くようならタイトルに戻す
    if (errCount === 20) { errCount = 0; G.mode = 'title'; releaseAllPointers(); }
  }
}

resize();
G.players = [makePlayer(0), makePlayer(1)];
requestAnimationFrame(frame);
</script>
