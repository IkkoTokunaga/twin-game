<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>STAR DIGGERS — ふたりでほって星さがし</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%; overflow:hidden; background:#05060f;
    touch-action:none; -webkit-user-select:none; user-select:none;
    -webkit-tap-highlight-color:transparent; overscroll-behavior:none;
    font-family:-apple-system, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
  }
  #cv { display:block; position:fixed; inset:0; touch-action:none; }
  html:fullscreen, body:fullscreen { width:100%; height:100%; }
</style>
</head>
<body>
<canvas id="cv"></canvas>
<script>
'use strict';

/* ============================================================
   STAR DIGGERS
   画面を上下に分割し、中央のブロック畑を2人で掘って
   隠れたスターを探す協力ゲーム。
   - 自分側のゾーンをドラッグ → 機体が指に追従
   - 触れている間は自動連射（同時タップは pointerId で独立管理）
   - 掘るほどチャージが溜まり、満タンで一気に貫通する大ビーム
============================================================ */

const cv  = document.getElementById('cv');
const ctx = cv.getContext('2d');

let W = 0, H = 0, DPR = 1;
let CELL = 0;                  // ブロック1個の一辺
const Z = { top:{y0:0,y1:0}, bot:{y0:0,y1:0}, cy:0 };

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  // 必ずレイアウトビューポートを使う。visualViewport はピンチ操作で縮むため、
  // それに合わせてキャンバスを作り直すと clientX/clientY と座標系がずれて操作不能になる。
  const de = document.documentElement;
  W = Math.round(window.innerWidth  || de.clientWidth);
  H = Math.round(window.innerHeight || de.clientHeight);
  cv.width  = Math.round(W * DPR);
  cv.height = Math.round(H * DPR);
  cv.style.width  = W + 'px';
  cv.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

  // ブロック1個の高さ。畑の広さに関係なく常にこの寸法で敷く
  CELL = (H * 0.63 - H * 0.37) / 5;

  // 各プレイヤーの可動域は、その分だけブロック2段ぶん削って畑に明け渡す
  Z.top.y0 = H * 0.10;  Z.top.y1 = H * 0.35 - CELL * 2;
  Z.bot.y0 = H * 0.65 + CELL * 2;  Z.bot.y1 = H * 0.90;
  Z.cy = H / 2;
  // 全画面ボタンは中央帯の右端＝どちらのプレイヤーの操作エリアにも掛からない位置
  FS.btn.x = W - 36;
  FS.btn.y = Z.cy;

  // ミュートは全画面ボタンと対になる左端中央へ。ポーズはその上に並べる
  AU.btn.x = 36;
  AU.btn.y = Z.cy;
  PAUSE.btn.x = 36;
  PAUSE.btn.y = Z.cy - 66;

  // スタート画面の人数選択ボタン（中央帯に縦に2つ）
  const mw = Math.min(320, W * 0.62), mh = 88;
  MENU.solo = { x: (W - mw) / 2, y: Z.cy - mh - 12, w: mw, h: mh };
  MENU.duo  = { x: (W - mw) / 2, y: Z.cy + 12,      w: mw, h: mh };

  updateRect();
  makeStars();
  for (const p of G.players) clampPlayer(p);
  if (G.mode !== 'title' && FIELD.cell) makeField(G.stage);   // 画面サイズが変わったら畑を作り直す
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 200));
// キャンバスの実表示位置。ページが拡大・スクロールされても入力座標を正しく戻すために使う
const rect = { left: 0, top: 0, sx: 1, sy: 1 };
function updateRect() {
  const r = cv.getBoundingClientRect();
  if (!r.width || !r.height) return;
  rect.left = r.left; rect.top = r.top;
  rect.sx = W / r.width; rect.sy = H / r.height;
}
// ピンチで拡大されてもキャンバスは作り直さず、座標の変換だけ追従させる
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', updateRect);
  window.visualViewport.addEventListener('scroll', updateRect);
}
const localX = (e) => (e.clientX - rect.left) * rect.sx;
const localY = (e) => (e.clientY - rect.top)  * rect.sy;

/* ---------------- スタート画面の人数選択 ---------------- */
const MENU = { solo: { x:0, y:0, w:0, h:0 }, duo: { x:0, y:0, w:0, h:0 } };
const inRect = (r, x, y) => x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h;

/* ---------------- ポーズ ---------------- */
const PAUSE = { btn: { x:0, y:0, r:26 } };

function setPaused(on) {
  if (on && G.mode === 'play') {
    G.mode = 'pause';
    releaseAllPointers();      // 指を離した状態にしておく（再開時の暴発防止）
  } else if (!on && G.mode === 'pause') {
    G.mode = 'play';
  }
}

/* ---------------- 全画面 ---------------- */
const FS = {
  supported: !!(document.documentElement.requestFullscreen ||
                document.documentElement.webkitRequestFullscreen),
  btn: { x:0, y:0, r:26 },
};

function isFullscreen() {
  return !!(document.fullscreenElement || document.webkitFullscreenElement);
}

function enterFullscreen() {
  const el = document.documentElement;
  const fn = el.requestFullscreen || el.webkitRequestFullscreen;
  if (!fn) return;
  try {
    // ブラウザによっては Promise を返さないので包んで握り潰す
    Promise.resolve(fn.call(el, { navigationUI: 'hide' })).then(lockOrientation, () => {});
  } catch (_) { /* ユーザー操作外の呼び出しなどは無視 */ }
}

function exitFullscreen() {
  const fn = document.exitFullscreen || document.webkitExitFullscreen;
  if (!fn) return;
  try { Promise.resolve(fn.call(document)).catch(() => {}); } catch (_) {}
}

function toggleFullscreen() { isFullscreen() ? exitFullscreen() : enterFullscreen(); }

function lockOrientation() {
  // 対応端末でのみ縦向き固定（非対応でも例外を出さない）
  try {
    const so = screen.orientation;
    if (so && so.lock) Promise.resolve(so.lock('portrait')).catch(() => {});
  } catch (_) {}
}

for (const ev of ['fullscreenchange', 'webkitfullscreenchange']) {
  document.addEventListener(ev, () => { resize(); setTimeout(resize, 120); });
}

/* ============================================================
   サウンド（Web Audio による合成 / 音源ファイル不要）
   波形を都度生成するので外部リクエストは一切発生しない。
============================================================ */
const AU = {
  supported: !!(window.AudioContext || window.webkitAudioContext),
  ctx: null, master: null, sfxBus: null, bgmBus: null, noise: null,
  muted: false,
  btn: { x:0, y:0, r:26 },
};

function audioInit() {
  if (AU.ctx || !AU.supported) return;
  const C = window.AudioContext || window.webkitAudioContext;
  AU.ctx = new C();

  // 同時発音が重なっても歪まないよう、出力前に軽く潰す
  const comp = AU.ctx.createDynamicsCompressor();
  comp.threshold.value = -14; comp.ratio.value = 12;
  comp.attack.value = 0.003; comp.release.value = 0.15;

  AU.master = AU.ctx.createGain(); AU.master.gain.value = AU.muted ? 0 : 0.9;
  AU.sfxBus = AU.ctx.createGain(); AU.sfxBus.gain.value = 0.55;
  AU.bgmBus = AU.ctx.createGain(); AU.bgmBus.gain.value = 0.28;
  AU.sfxBus.connect(comp); AU.bgmBus.connect(comp);
  comp.connect(AU.master); AU.master.connect(AU.ctx.destination);

  // ホワイトノイズは1本作って使い回す
  const len = Math.floor(AU.ctx.sampleRate * 0.6);
  const buf = AU.ctx.createBuffer(1, len, AU.ctx.sampleRate);
  const ch = buf.getChannelData(0);
  for (let i = 0; i < len; i++) ch[i] = Math.random() * 2 - 1;
  AU.noise = buf;

  BGM.nextTime = AU.ctx.currentTime;
}

// 自動再生制限があるので、必ずユーザー操作の中から呼ぶ
function audioResume() {
  audioInit();
  if (AU.ctx && AU.ctx.state === 'suspended') AU.ctx.resume().catch(() => {});
}

function setMuted(m) {
  AU.muted = m;
  if (AU.master) AU.master.gain.setTargetAtTime(m ? 0 : 0.9, AU.ctx.currentTime, 0.02);
}

document.addEventListener('visibilitychange', () => {
  if (!AU.ctx) return;
  if (document.hidden) AU.ctx.suspend().catch(() => {});
  else if (!AU.muted) AU.ctx.resume().catch(() => {});
});

/* --- 音を鳴らす最小プリミティブ --- */
function tone(o) {
  if (!AU.ctx || AU.muted) return;
  const t = AU.ctx.currentTime + (o.delay || 0);
  const osc = AU.ctx.createOscillator();
  const g = AU.ctx.createGain();
  osc.type = o.type || 'square';
  osc.frequency.setValueAtTime(o.f, t);
  if (o.f2) osc.frequency.exponentialRampToValueAtTime(Math.max(20, o.f2), t + o.dur);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(o.vol, t + (o.atk || 0.006));
  g.gain.exponentialRampToValueAtTime(0.0001, t + o.dur);
  osc.connect(g); g.connect(o.bus || AU.sfxBus);
  osc.start(t); osc.stop(t + o.dur + 0.03);
}

function noiseBurst(o) {
  if (!AU.ctx || AU.muted) return;
  const t = AU.ctx.currentTime + (o.delay || 0);
  const src = AU.ctx.createBufferSource(); src.buffer = AU.noise;
  const f = AU.ctx.createBiquadFilter();
  f.type = o.filter || 'lowpass';
  f.frequency.setValueAtTime(o.f, t);
  if (o.f2) f.frequency.exponentialRampToValueAtTime(Math.max(40, o.f2), t + o.dur);
  const g = AU.ctx.createGain();
  g.gain.setValueAtTime(o.vol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + o.dur);
  src.connect(f); f.connect(g); g.connect(o.bus || AU.sfxBus);
  src.start(t); src.stop(t + o.dur + 0.03);
}

// 高頻度で鳴る音は間引かないと音が濁り、発振器も無駄に増える
const _lastPlay = {};
function throttled(key, ms, fn) {
  const n = performance.now();
  if (_lastPlay[key] && n - _lastPlay[key] < ms) return;
  _lastPlay[key] = n;
  fn();
}

const SFX = {
  shot(idx) {
    throttled('shot' + idx, 55, () =>
      tone({ f: idx ? 900 : 760, f2: idx ? 430 : 360, type:'square', dur:0.07, vol:0.05 }));
  },
  beam() {
    tone({ f:180, f2:1500, type:'sawtooth', dur:0.45, vol:0.20 });
    noiseBurst({ f:500, f2:5000, dur:0.4, vol:0.14, filter:'bandpass' });
  },
  blockHit() {                                   // ブロックを削る音
    throttled('bhit', 55, () => noiseBurst({ f:1400, f2:600, dur:0.05, vol:0.10 }));
  },
  blockBreak() {                                 // ブロックが割れる音
    throttled('bbreak', 40, () => {
      noiseBurst({ f:2400, f2:300, dur:0.22, vol:0.26 });
      tone({ f:320, f2:150, type:'square', dur:0.12, vol:0.09 });
    });
  },
  bomb() {
    noiseBurst({ f:2600, f2:40, dur:1.0, vol:0.6 });
    noiseBurst({ f:400, f2:60, dur:0.7, vol:0.45, filter:'lowpass', delay:0.02 });
    tone({ f:150, f2:28, type:'square', dur:0.7, vol:0.3 });
    tone({ f:70,  f2:24, type:'sawtooth', dur:0.9, vol:0.22, delay:0.03 });
  },
  near() {                                       // スターが近いことを知らせる小さな音
    throttled('near', 220, () => tone({ f:1180, f2:1560, type:'triangle', dur:0.12, vol:0.10 }));
  },
  starFound() {                                  // 掘り当てた瞬間
    [784, 988, 1319].forEach((f, i) =>
      tone({ f, type:'triangle', dur:0.24, vol:0.20, delay:i * 0.06 }));
  },
  starGet() {                                    // 回収した瞬間
    [523, 659, 784, 1047, 1319].forEach((f, i) =>
      tone({ f, type:'triangle', dur:0.26, vol:0.20, delay:i * 0.065 }));
  },
  clear() {
    [523, 659, 784, 1047].forEach((f, i) =>
      tone({ f, type:'square', dur:0.34, vol:0.17, delay:i * 0.13 }));
    noiseBurst({ f:6000, f2:1000, dur:0.5, vol:0.10, filter:'highpass', delay:0.5 });
  },
  milestone() {                                  // 10ステージごとの大きなファンファーレ
    const mel = [523, 659, 784, 1047, 784, 1047, 1319];
    mel.forEach((f, i) => {
      tone({ f, type:'square',   dur:0.34, vol:0.18, delay:i * 0.16 });
      tone({ f: f / 2, type:'triangle', dur:0.34, vol:0.10, delay:i * 0.16 });
    });
    tone({ f:1568, type:'triangle', dur:1.1, vol:0.2, delay:mel.length * 0.16 });
  },
  firework() {
    throttled('fw', 90, () => {
      noiseBurst({ f:5200, f2:600, dur:0.42, vol:0.2, filter:'highpass' });
      tone({ f:900, f2:280, type:'triangle', dur:0.2, vol:0.09 });
    });
  },
  stage() {
    [392, 523, 659].forEach((f, i) =>
      tone({ f, type:'triangle', dur:0.28, vol:0.16, delay:i * 0.09 }));
  },
  chip() {                                       // かけらを拾った
    throttled('chip', 60, () => {
      tone({ f:880, f2:1320, type:'triangle', dur:0.12, vol:0.15 });
    });
  },
  locked() {                                     // 色が違って弾かれた
    throttled('locked', 110, () => tone({ f:330, f2:250, type:'square', dur:0.09, vol:0.09 }));
  },
  powerDrop() {                                  // 強化かけらが出た
    [880, 1175].forEach((f, i) => tone({ f, type:'triangle', dur:0.2, vol:0.16, delay:i * 0.12 }));
  },
  powerDown() {                                  // ダメージでビームが弱くなった
    [784, 587, 440].forEach((f, i) =>
      tone({ f, type:'square', dur:0.22, vol:0.15, delay:i * 0.09 }));
  },
  giantLaser() {                                 // 巨大レーザー
    tone({ f:90, f2:1400, type:'sawtooth', dur:0.7, vol:0.28 });
    tone({ f:180, f2:60, type:'square', dur:0.9, vol:0.2, delay:0.05 });
    noiseBurst({ f:400, f2:9000, dur:0.6, vol:0.3, filter:'bandpass' });
    noiseBurst({ f:6000, f2:300, dur:0.9, vol:0.22, filter:'highpass', delay:0.1 });
  },
  powerup() {                                    // 強化かけらを取った
    [523, 784, 1047, 1568].forEach((f, i) =>
      tone({ f, type:'square', dur:0.3, vol:0.19, delay:i * 0.08 }));
    noiseBurst({ f:5000, f2:800, dur:0.4, vol:0.14, filter:'highpass' });
  },
  bugOut() { tone({ f:300, f2:520, type:'sawtooth', dur:0.18, vol:0.10 }); },
  bugHit() {
    noiseBurst({ f:1600, f2:300, dur:0.2, vol:0.2 });
    tone({ f:520, f2:180, type:'square', dur:0.16, vol:0.12 });
  },
  stun() {                                       // ぶつかった
    tone({ f:220, f2:90, type:'sawtooth', dur:0.4, vol:0.18 });
    noiseBurst({ f:700, f2:150, dur:0.35, vol:0.22 });
  },
  ui() { tone({ f:620, f2:930, type:'triangle', dur:0.08, vol:0.13 }); },
};

/* --- BGM：16ステップのシーケンスを先読みしながら組み立てる --- */
const BGM = {
  nextTime: 0,
  step: 0,
  arp:  [0, 7, 3, 10, 5, 7, 3, 12, 0, 7, 3, 10, 8, 7, 5, 3],
  bass: [1, 0, 0, 0, 1, 0, 1, 0, 1, 0, 0, 0, 1, 0, 1, 1],
};

function bgmUpdate() {
  if (!AU.ctx || AU.muted || G.mode !== 'play') return;
  const tempo = Math.min(150, 98 + G.stage * 4);
  const stepDur = 60 / tempo / 4;                 // 16分音符
  const now = AU.ctx.currentTime;
  if (BGM.nextTime < now) BGM.nextTime = now;     // タブ復帰などで大きく遅れた場合
  while (BGM.nextTime < now + 0.25) {             // 0.25秒先まで先読みして予約
    bgmStep(BGM.step, BGM.nextTime, stepDur);
    BGM.step = (BGM.step + 1) % 16;
    BGM.nextTime += stepDur;
  }
}

function bgmStep(s, t, dur) {
  const d = t - AU.ctx.currentTime;
  if (d < 0) return;
  const root = 55 * Math.pow(2, ((G.stage - 1) % 5) * 2 / 12);   // ステージごとに少しずつ上へ

  if (BGM.bass[s]) {
    tone({ f: root, type:'square', dur: dur * 1.9, vol: 0.22, delay: d, bus: AU.bgmBus });
  }
  if (s % 2 === 0) {
    tone({ f: root * 4 * Math.pow(2, BGM.arp[s] / 12), type:'triangle',
           dur: dur * 1.3, vol: 0.09, delay: d, bus: AU.bgmBus });
  }
  noiseBurst({ f: 7000, dur: 0.03, vol: s % 4 === 2 ? 0.05 : 0.022,
               filter:'highpass', delay: d, bus: AU.bgmBus });
}

/* ============================================================
   ステージ設定
   序盤は子供でも掘り切れる量にし、進むほど硬いブロックと
   スターの数が増える。
============================================================ */
function stageSetup(n) {
  return {
    stars: Math.min(2 + Math.floor((n - 1) / 2), 5),   // 隠されたスターの数
    // 硬いブロックはステージが進むと登場し、少しずつ増えていく
    brickRate:   n >= BLOCK_DEBUT[B_BRICK]   ? Math.min(0.10 + (n - 2) * 0.03, 0.26) : 0,
    rockRate:    n >= BLOCK_DEBUT[B_ROCK]    ? Math.min(0.06 + (n - 4) * 0.03, 0.18) : 0,
    diamondRate: n >= BLOCK_DEBUT[B_DIAMOND] ? Math.min(0.04 + (n - 7) * 0.02, 0.10) : 0,
    bombRate: Math.min(0.03 + (n - 1) * 0.02, 0.12),   // ばくだんブロックの割合
    rows: 5,
    // ひとり用では相手の色のブロックが壊せず詰むので、色つきブロック自体を出さない
    lockRate: G.solo ? 0 : Math.min(0.07 + (n - 1) * 0.02, 0.14),
    // ひとり用は全部のおじゃまむしが自分に来るので、出る間隔を空ける
    bugEvery: Math.max(3.2, 7.5 - (n - 1) * 0.6) * (G.solo ? 1.5 : 1),
  };
}

/* ============================================================
   ビームの強化
   ◆かけらを一定数あつめると強化アイテムが落ちてくる。
============================================================ */
const CHIPS_PER_POWER = 5;          // 何個あつめたら強化アイテムが出るか
const BEAM_LEVELS = [          // 強攻撃（まっすぐ貫くビーム）
  { r: 20, dmg: 110, pierce: 3 },
  { r: 25, dmg: 145, pierce: 4 },
  { r: 30, dmg: 180, pierce: 5 },
  { r: 36, dmg: 230, pierce: 7 },
];
const SHOT_LEVELS = [          // 通常攻撃（扇状）
  { n: 3, spread: 0.15, dmg: 8,  cool: 0.115, r: 5.0 },
  { n: 5, spread: 0.18, dmg: 9,  cool: 0.108, r: 5.5 },
  { n: 5, spread: 0.24, dmg: 11, cool: 0.100, r: 6.0 },
  { n: 7, spread: 0.30, dmg: 13, cool: 0.092, r: 6.5 },
];
const POWER_KINDS = ['beam', 'shot'];

/* ---------------- 自機のサイズと指との位置関係 ---------------- */
const SHIP = {
  scale: 1.8,     // 見た目の拡大率
  hit: 17,        // 当たり判定の半径（見た目より小さめ＝弾幕ゲーの定石）
  edgeY: 46,      // 画面の上下端の不可侵帯。ホームバーや通知シェードを引っぱらせない
  edgeX: 26,      // 同じく左右端（戻るジェスチャ対策）
  gap: 64,        // 指と機体の最小距離。これ未満だと指で機体が隠れる
};

/* ---------------- utils ---------------- */
const rand  = (a, b) => a + Math.random() * (b - a);
const clamp = (v, a, b) => v < a ? a : (v > b ? b : v);
const TAU = Math.PI * 2;

/* ---------------- 背景の星 ---------------- */
let stars = [];
function makeStars() {
  stars = [];
  const n = Math.round((W * H) / 9000);
  for (let i = 0; i < n; i++) {
    stars.push({ x: rand(0, W), y: rand(0, H), r: rand(0.4, 1.6), s: rand(4, 26), a: rand(0.25, 0.9) });
  }
}

/* ---------------- ゲーム状態 ---------------- */
const G = {
  mode: 'title',          // title | play | pause | clear | over
  t: 0,
  stage: 1,
  survT: 0,               // ひとり用の生存時間（秒）
  soloTier: 1,            // ひとり用で今どこまで難度が上がったか（告知ずみの段階）
  crush: 0,               // 自陣ラインを越えて積もっている行数（負け判定用）
  approach: 0,            // 一番下のブロックとラインの符号つき距離（px・警告用）
  overInfo: null,         // ゲームオーバー時の記録 {t, score}
  solo: false,            // ひとり用（青のプレイヤーだけ）
  score: 0,
  players: [],
  bullets: [],            // プレイヤー弾
  gems: [],               // 掘り出されたスター
  chips: [],              // ブロックから落ちるかけら（拾うとチャージ）
  clones: [],             // 分身（数秒だけ本人と逆に動いて撃つ）
  bugs: [],               // おじゃまむし（当たると一時停止）
  bugT: 0,                // 次のおじゃまむしまでの秒数
  blasts: [],             // 爆発の衝撃波
  celebrate: null,        // 10ステージごとのお祝い演出
  flash: 0,               // 画面全体の閃光
  parts: [],
  starsFound: 0,
  starsTotal: 0,
  nextT: 0,               // 次のステージまでの秒数
  stageT: 0,              // このステージの経過時間
  shake: 0,
  banner: null,           // {text, life}
};

const P_COLORS = [
  { main:'#31e6ff', glow:'#0af', name:'PLAYER 1' },   // 下側
  { main:'#ff5cc8', glow:'#f0a', name:'PLAYER 2' },   // 上側
];

function makePlayer(idx) {
  const bottom = idx === 0;
  return {
    idx,
    bottom,
    dirY: bottom ? -1 : 1,               // 弾の進行方向
    x: W / 2,
    y: bottom ? (Z.bot.y0 + Z.bot.y1) / 2 : (Z.top.y0 + Z.top.y1) / 2,
    tx: W / 2, ty: 0,
    fx: 0, fy: 0,                        // 指の実座標
    charge: 0, maxCharge: 100,
    dug: 0,                              // 掘ったブロック数
    stars: 0,                            // 見つけたスターの数
    cool: 0,
    stun: 0,                             // おじゃまむしに触れると少しの間うごけない
    outside: false,                      // 指が画面の外にある間は停止する
    caught: 0,                           // 拾ったかけらの数
    beam: 0,                             // 強攻撃の強化段階（BEAM_LEVELS の添字）
    shot: 0,                             // 通常攻撃の強化段階（SHOT_LEVELS の添字）
    powers: 0,                           // 受け取った強化アイテムの数（種類の振り分けに使う）
    firing: false,
    pointer: -1,
    stack: [],                           // その側に触れている指（最初の1本が操作中）
    kbd: false,                          // PCのキーボードで操作中か（一度使うと有効）
  };
}

// 機体が動ける矩形。判定と枠の表示を必ず同じ値から導くための唯一の定義。
function zoneRect(bottom) {
  const z = bottom ? Z.bot : Z.top;
  const m = 20 * SHIP.scale;             // 機体が画面端からはみ出さない余白
  // 横は畑（12列）に合わせ、端の列の中心まで届く範囲にする。
  // 畑より外の空きスペースへは行けない（＝どの列も必ず狙える）。
  let x0 = m, x1 = W - m;
  if (FIELD.cell) {
    const half = FIELD.cell / 2;
    x0 = clamp(FIELD.x0 + half, m, W - m);
    x1 = clamp(FIELD.x0 + FIELD.cols * FIELD.cell - half, m, W - m);
  }
  return { x0, y0: z.y0, x1, y1: z.y1 };
}

function clampPlayer(p) {
  const r = zoneRect(p.bottom);
  p.x  = clamp(p.x,  r.x0, r.x1);
  p.y  = clamp(p.y,  r.y0, r.y1);
  p.tx = clamp(p.tx, r.x0, r.x1);
  p.ty = clamp(p.ty, r.y0, r.y1);
}

/* 指の位置から機体の目標位置を決める。
   指より敵側にずらすことで、機体が指の下に隠れないようにする。 */
// 指が届く範囲を、機体が動ける範囲へそのまま写像する。
//
// 「指の位置から一定量ずらす」方式だと、機体を自分の陣地の端まで動かすのに
// 指を画面外へ出す必要があり、しかも画面の上下端は端末のシステムジェスチャ
// 領域なので操作が OS に奪われてしまう。指の可動範囲そのものを陣地に対応
// させることで、画面端に触れなくても隅々まで届き、かつ機体は常に指より
// 敵側（＝指に隠れない位置）に来る。
// そのプレイヤーが機体を操作するために指を置く帯
function fingerBand(p) {
  const z = p.bottom ? Z.bot : Z.top;
  return p.bottom
    ? { f0: z.y0 + SHIP.gap, f1: H - SHIP.edgeY }
    : { f0: SHIP.edgeY,      f1: z.y1 - SHIP.gap };
}

function aimFromFinger(p, cx, cy) {
  if (!isFinite(cx) || !isFinite(cy)) return;   // NaN が入ると機体が消える
  p.fx = cx; p.fy = cy;
  const z = p.bottom ? Z.bot : Z.top;

  // 指の可動範囲。機体が必ず指より敵側に来るよう、陣地の手前に gap を確保する
  const { f0, f1 } = fingerBand(p);
  const t  = f1 > f0 ? clamp((cy - f0) / (f1 - f0), 0, 1) : 0;
  p.ty = z.y0 + t * (z.y1 - z.y0);

  const rc = zoneRect(p.bottom);
  const u  = clamp((cx - SHIP.edgeX) / Math.max(1, W - SHIP.edgeX * 2), 0, 1);
  p.tx = rc.x0 + u * (rc.x1 - rc.x0);

  clampPlayer(p);
}

/* ============================================================
   ブロック畑
   中央帯を格子状のブロックで埋め、いくつかのブロックの中に
   スターを隠す。プレイヤーは上下から掘り進めてスターを探す。
============================================================ */
// 掘るのに要る手数が増えていく4段階。ステージが進むと硬いものが出てくる
const B_NORMAL = 0, B_BRICK = 1, B_ROCK = 2, B_DIAMOND = 3, B_BOMB = 4;
// 色つきブロックは対応するプレイヤーしか壊せない（B_LOCK0=下の青 / B_LOCK1=上の赤）
const B_LOCK0 = 5, B_LOCK1 = 6;
const lockOwner = (t) => t === B_LOCK0 ? 0 : (t === B_LOCK1 ? 1 : -1);

const BLOCK_HP = {
  [B_NORMAL]:  24,
  [B_BRICK]:   60,
  [B_ROCK]:   130,
  [B_DIAMOND]:300,
  [B_BOMB]:    24,
  [B_LOCK0]:   24,
  [B_LOCK1]:   24,
};
const BLOCK_NAME = { [B_BRICK]:'レンガ', [B_ROCK]:'いわ', [B_DIAMOND]:'ダイヤ' };
// 硬いブロックが初めて出るステージ
const BLOCK_DEBUT = { [B_BRICK]: 2, [B_ROCK]: 4, [B_DIAMOND]: 7 };

// 4マスをまとめた大きい正方形ブロック。ステージ10から登場する。
// 1マスぶんより耐久が高く、掘り応えがある
const MEGA_DEBUT = 10;
const MEGA_HP = { [B_BRICK]: 520, [B_ROCK]: 1150, [B_DIAMOND]: 2400 };
// 大きいブロックは、その硬さが普通サイズで出てから MEGA_LAG 段階あとに解禁する。
// いきなり大きいダイヤ（2400）が出ると、弱い弾では手も足も出ないため。
const MEGA_LAG = 2;
function megaTypesFor(n) {
  return [B_BRICK, B_ROCK, B_DIAMOND].filter(t => n >= BLOCK_DEBUT[t] + MEGA_LAG);
}

// ひとり用（エンドレス生存）: 畑がじわじわ迫り、自陣ラインを LOSE_ROWS 行ぶん
// 越えられたらゲームオーバー。掘り返して押し戻せば持ちこたえられる。
const LOSE_ROWS = 3;
// 赤い警告はラインを越える前から出す。あと WARN_LEAD 行に迫った時点で光り始める。
const WARN_LEAD = 4;
const FIELD = { x0:0, y0:0, cell:0, cols:0, rows:0, grid:[], scrollY:0, dangerY:0 };

function idxAt(c, r) { return r * FIELD.cols + c; }
function blockAt(c, r) {
  if (c < 0 || r < 0 || c >= FIELD.cols || r >= FIELD.rows) return null;
  return FIELD.grid[idxAt(c, r)];
}
// scrollY はひとり用で畑が下へ流れるぶんのずれ（ふたり用は常に0）
function cellCenter(c, r) {
  return { x: FIELD.x0 + (c + 0.5) * FIELD.cell, y: FIELD.y0 + (r + 0.5) * FIELD.cell + FIELD.scrollY };
}
// 画面上の y から畑の行番号を求める（スクロールぶんを差し引く）
function rowAtY(y) { return Math.floor((y - FIELD.y0 - FIELD.scrollY) / FIELD.cell); }

// ステージ設定 S の割合にしたがって1マスぶんのブロックを1つ作る
function rollBlock(S) {
  const tDia   = S.diamondRate;
  const tRock  = tDia + S.rockRate;
  const tBrick = tRock + S.brickRate;
  const tBomb  = tBrick + S.bombRate;
  const tL0    = tBomb + S.lockRate;
  const tL1    = tL0 + S.lockRate;
  const rnd = Math.random();
  let type = B_NORMAL;
  if      (rnd < tDia)   type = B_DIAMOND;
  else if (rnd < tRock)  type = B_ROCK;
  else if (rnd < tBrick) type = B_BRICK;
  else if (rnd < tBomb)  type = B_BOMB;
  else if (rnd < tL0)    type = B_LOCK0;
  else if (rnd < tL1)    type = B_LOCK1;
  const hp = BLOCK_HP[type];
  return { type, hp, maxHp: hp, star: false, flash: 0 };
}

// 横は常に FIELD_COLS 列に固定する。幅が足りない端末（スマホ）ではセルを
// 縮めて 12 列を収め、広い画面では普通サイズのまま中央に寄せる。
const FIELD_COLS = 12;
function fieldMetrics() {
  const inset = 20 * SHIP.scale;
  const usableW = W - inset * 2;
  const cell = Math.min(Math.max(28, CELL), usableW / FIELD_COLS);
  return { cell, cols: FIELD_COLS, x0: (W - FIELD_COLS * cell) / 2 };
}

function makeField(stage) {
  FIELD.scrollY = 0;
  FIELD.dangerY = 0;
  if (G.solo) { makeSurvivalField(); return; }   // ひとり用は迫りくる畑

  const S = stageSetup(stage);
  // ブロックの寸法は画面サイズだけで決まる。段数は空いている高さから求める
  // 陣地の縁に張り付いた機体の砲口が畑にめり込まないだけの間隔を空ける
  const pad = 20 * SHIP.scale + 4;
  const duoY0 = Z.top.y1 + pad;
  const duoY1 = Z.bot.y0 - pad;
  const { cell, cols, x0 } = fieldMetrics();

  const topY = duoY0;
  const rows = Math.max(1, Math.floor((duoY1 - topY) / cell));

  FIELD.cell = cell;
  FIELD.rows = rows;
  FIELD.cols = cols;
  FIELD.x0 = x0;
  FIELD.y0 = duoY1 - rows * cell;      // 青プレイヤー側の入口の高さは常に同じ
  FIELD.grid = new Array(cols * rows);

  for (let i = 0; i < FIELD.grid.length; i++) FIELD.grid[i] = rollBlock(S);

  // ステージが進むと、4マスをまとめた大きいブロックを混ぜる
  if (stage >= MEGA_DEBUT) placeMegaBlocks(stage);

  // スターを重複なく隠す。上下の端の列は序盤で当たりやすいので避ける
  const pool = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const b = FIELD.grid[idxAt(c, r)];
      // 大きいブロックの中にはスターを隠さない（取り出しに手間がかかりすぎる）
      if (b.type !== B_BOMB && !b.mega && !b.slave) pool.push(idxAt(c, r));
    }
  }
  // 畑が広いひとり用は、その広さに見合うだけスターを増やす
  const want = G.solo ? Math.round(S.stars * 1.5) : S.stars;
  let placed = 0;
  while (placed < want && pool.length) {
    const k = Math.floor(rand(0, pool.length));
    FIELD.grid[pool[k]].star = true;
    pool.splice(k, 1);
    placed++;
  }
  ensureReachable();
  G.starsTotal = placed;
  G.starsFound = 0;
}

// ★ごとに、少なくとも片方のプレイヤーが必ず掘り着けるようにする。
// ★の下に赤、上に青が挟まると誰も到達できず詰むため、
// 選んだ側から★までの経路にある「相手の色」のブロックを普通のブロックに戻す。
function ensureReachable() {
  for (let r = 0; r < FIELD.rows; r++) {
    for (let c = 0; c < FIELD.cols; c++) {
      const b = FIELD.grid[idxAt(c, r)];
      if (!b || !b.star) continue;

      const side = Math.random() < 0.5 ? 0 : 1;      // 0=下から / 1=上から
      const blocker = side === 0 ? B_LOCK1 : B_LOCK0;

      if (b.type === blocker) { b.type = B_NORMAL; b.hp = b.maxHp = BLOCK_HP[B_NORMAL]; }

      const from = side === 0 ? r + 1 : 0;
      const to   = side === 0 ? FIELD.rows - 1 : r - 1;
      for (let rr = from; rr <= to; rr++) {
        const n = FIELD.grid[idxAt(c, rr)];
        if (n && n.type === blocker) { n.type = B_NORMAL; n.hp = n.maxHp = BLOCK_HP[B_NORMAL]; }
      }
    }
  }
}

/* ============================================================
   ひとり用: 迫りくる畑（エンドレス生存）
   畑がじわじわ下へスクロールし、上から新しい行が補給され続ける。
   自陣ライン（機体のいる帯の上端）を LOSE_ROWS 行ぶん越えられたら負け。
============================================================ */
// 生存時間から今の難度を「相当ステージ」に換算する。
// 段階1（＝ふつうのブロックだけ）から始めて、SOLO_STEP 秒ごとに1段階上げる。
// BLOCK_DEBUT / MEGA_LAG により、レンガ15秒・いわ45秒・ダイヤ90秒、
// 大きいブロックはレンガ45秒→いわ75秒→ダイヤ120秒の順で解禁される。
const SOLO_STEP = 15;
function soloStage() { return 1 + Math.floor(G.survT / SOLO_STEP); }

// 難度が一段上がった瞬間に、新しく出るブロックを知らせる。
// ふたり用でステージが変わるときの告知と同じ役目。
function announceSoloTier() {
  const n = soloStage();
  if (n <= G.soloTier) return;
  G.soloTier = n;
  const debut = Object.keys(BLOCK_DEBUT).find(t => BLOCK_DEBUT[t] === n);
  if (debut) G.banner = { text: `あたらしいブロック: ${BLOCK_NAME[debut]}`, life: 2.2 };
  else if (megaTypesFor(n).length > megaTypesFor(n - 1).length)
    G.banner = { text: 'おおきいブロックがくる！', life: 2.2 };
  else return;
  SFX.stage();
}

// スクロール速度（px/秒）。時間が経つほど速く迫る
function soloScrollSpeed() {
  return FIELD.cell * clamp(0.30 + G.survT * 0.006, 0.30, 1.5);
}

// ひとり用ではかけらは畑と同じく画面上部から降ってきて、機体が下で受け止める
function soloChipX() { return rand(FIELD.x0 + 24, FIELD.x0 + FIELD.cols * FIELD.cell - 24); }
const SOLO_CHIP_Y = -12;

function makeSurvivalField() {
  const { cell, cols, x0 } = fieldMetrics();

  FIELD.cell = cell;
  FIELD.cols = cols;
  FIELD.x0 = x0;
  FIELD.y0 = -cell;                       // 一番上の行は画面の外から入ってくる
  FIELD.scrollY = 0;
  FIELD.dangerY = Z.bot.y0;               // ここを越えて積もると危険
  // 画面上端の外から自陣ライン＋LOSE_ROWS行ぶんまで。末尾に1行だけ余白を足す
  const rows = Math.ceil((FIELD.dangerY + LOSE_ROWS * cell - FIELD.y0) / cell) + 1;
  FIELD.rows = rows;
  FIELD.grid = new Array(cols * rows).fill(null);

  const S = stageSetup(soloStage());
  // 序盤は上のほうだけ埋め、機体との間に余白を残す。
  // さらに5ブロックぶん上げて、開始直後の猶予を長めにとる
  const fillTo = Math.max(1, Math.floor((H * 0.46 - FIELD.y0) / cell) - 5);
  for (let r = 0; r <= fillTo && r < rows; r++)
    for (let c = 0; c < cols; c++) FIELD.grid[idxAt(c, r)] = rollBlock(S);
  // 開始直後は大きいブロックを置かない（解禁前は megaTypesFor が空になる）
  const megaT = megaTypesFor(soloStage());
  if (megaT.length) tryPlaceMega(0, Math.min(fillTo, rows - 2), 1 + Math.floor(cols / 8), megaT);

  G.starsTotal = 0; G.starsFound = 0;     // エンドレスではスター集めの目標はない
}

// 指定の行範囲に、解禁済みの種類 types から大きいブロックを count 個ぶん試し置きする
function tryPlaceMega(rTop, rBot, count, types) {
  if (!types || !types.length) return;
  let made = 0, tries = 0;
  while (made < count && tries < 40) {
    tries++;
    const c = Math.floor(rand(0, FIELD.cols - 1));
    const r = rTop + Math.floor(rand(0, Math.max(1, rBot - rTop + 1)));
    if (!megaFits(c, r)) continue;
    setMega(c, r, types[Math.floor(rand(0, types.length))]);
    made++;
  }
}

// 毎フレーム、畑を下へ流す。1マスぶん下がるたびに上へ新しい行を補給
function scrollSurvival(dt) {
  const cell = FIELD.cell;
  FIELD.scrollY += soloScrollSpeed() * dt;
  while (FIELD.scrollY >= cell) {
    FIELD.scrollY -= cell;
    commitSurvivalRow();
  }
}

function commitSurvivalRow() {
  const cols = FIELD.cols, rows = FIELD.rows;
  // 全体を1行ぶん下へずらす（子ブロックは親との相対位置で持つのでずれない）
  for (let r = rows - 1; r >= 1; r--)
    for (let c = 0; c < cols; c++) FIELD.grid[idxAt(c, r)] = FIELD.grid[idxAt(c, r - 1)];
  const n = soloStage();
  const S = stageSetup(n);
  for (let c = 0; c < cols; c++) FIELD.grid[idxAt(c, 0)] = rollBlock(S);
  // 解禁後は、時間が経つほど大きいブロックが混ざりやすくなる（上の2行にまたがって置く）
  const firstMegaT = (BLOCK_DEBUT[B_BRICK] + MEGA_LAG - 1) * SOLO_STEP;   // 最初の解禁時刻（秒）
  const megaChance = clamp((G.survT - firstMegaT) * 0.01, 0, 0.45);
  if (Math.random() < megaChance) tryPlaceMega(0, 1, 1, megaTypesFor(n));
}

// 自陣ラインに一番近づいているブロックの、ラインとの距離（px）を返す。
// 越えていれば正、まだ手前なら負。警告はこの符号つきの値から出す。
function survivalIntrusion() {
  const cell = FIELD.cell, cols = FIELD.cols, rows = FIELD.rows;
  let deepest = -Infinity;
  for (let c = 0; c < cols; c++) {
    for (let r = rows - 1; r >= 0; r--) {          // 各列の一番下のブロックだけ見る
      if (FIELD.grid[idxAt(c, r)]) {
        const bottomY = FIELD.y0 + (r + 1) * cell + FIELD.scrollY;
        if (bottomY - FIELD.dangerY > deepest) deepest = bottomY - FIELD.dangerY;
        break;
      }
    }
  }
  return deepest === -Infinity ? -LOSE_ROWS * cell : deepest;
}

function triggerGameOver() {
  G.mode = 'over';
  G.overInfo = { t: G.survT, score: G.score };
  const p = G.players[0];
  if (p) explode(p.x, p.y);              // 派手に散らして幕引き
  G.clones.length = 0;                   // 分身も本人と一緒に消える
  G.shake = Math.max(G.shake, 26);
}

/* ============================================================
   大きいブロック（2×2）
   4マスをまとめて1つの正方形にする。左上を「親」として耐久を持ち、
   残る3マスは親を指す「子」にする。どのマスに当たっても親が削れ、
   壊れると4マスまとめて消える。
============================================================ */
// 2×2 がその位置に収まり、まだ大きいブロックと重なっていないか
function megaFits(c, r) {
  if (c + 1 >= FIELD.cols || r + 1 >= FIELD.rows) return false;
  for (let dc = 0; dc <= 1; dc++) for (let dr = 0; dr <= 1; dr++) {
    const b = FIELD.grid[idxAt(c + dc, r + dr)];
    if (!b || b.mega || b.slave) return false;
  }
  return true;
}

// (c,r) を左上に、指定の種類の大きいブロックを敷く。
// 子は親への「相対位置」(ox,oy) を持つ。行ごとスクロールしても崩れないように。
function setMega(c, r, type) {
  const hp = MEGA_HP[type];
  FIELD.grid[idxAt(c, r)] = { type, hp, maxHp: hp, star: false, flash: 0, mega: true };
  for (let dc = 0; dc <= 1; dc++) for (let dr = 0; dr <= 1; dr++) {
    if (!dc && !dr) continue;                 // 親はそのまま
    FIELD.grid[idxAt(c + dc, r + dr)] = { slave: true, ox: -dc, oy: -dr, type };
  }
}

function placeMegaBlocks(stage) {
  const cols = FIELD.cols, rows = FIELD.rows;
  // ステージが進むほど数を増やす。畑の広さで頭打ち
  const want = Math.min(2 + Math.floor((stage - MEGA_DEBUT) / 3), Math.floor(cols * rows / 12));
  const types = megaTypesFor(stage);
  if (!types.length) return;
  let made = 0, tries = 0;
  while (made < want && tries < 80) {
    tries++;
    const c = Math.floor(rand(0, cols - 1));   // 2×2 が収まる左上
    const r = Math.floor(rand(0, rows - 1));
    if (!megaFits(c, r)) continue;
    setMega(c, r, types[Math.floor(rand(0, types.length))]);
    made++;
  }
}

// ブロックを壊す。スター入りならスターを出し、ばくだんなら周囲を巻き込む
function breakBlock(c, r, ownerIdx, depth, noBomb) {
  const b = blockAt(c, r);
  if (!b) return;
  if (b.slave) { breakBlock(c + b.ox, r + b.oy, ownerIdx, depth, noBomb); return; }
  if (b.mega)  { breakMega(c, r, ownerIdx); return; }
  FIELD.grid[idxAt(c, r)] = null;
  const pos = cellCenter(c, r);
  G.score += 10;
  if (ownerIdx >= 0 && G.players[ownerIdx]) G.players[ownerIdx].dug++;

  if (b.type === B_BOMB && !noBomb) {
    explode(pos.x, pos.y);
    if ((depth || 0) < 3) {
      for (let dc = -1; dc <= 1; dc++) for (let dr = -1; dr <= 1; dr++) {
        if (!dc && !dr) continue;
        const n = blockAt(c + dc, r + dr);
        if (!n || lockOwner(n.type) >= 0) continue;   // 色つきは爆発でも壊れない
        if (n.mega || n.slave) continue;              // 大きいブロックは爆風では壊れない
        breakBlock(c + dc, r + dr, ownerIdx, (depth || 0) + 1);
      }
    }
  } else {
    SFX.blockBreak();
    burst(pos.x, pos.y, BLOCK_COLORS[b.type].edge, 12, 200, 5);
  }

  // ときどき「かけら」が自陣側へ落ちる。拾うにはタテにも動く必要がある。
  // ひとり用は畑と同じく画面上部から降ってくる。
  if (Math.random() < 0.14) {
    const side = G.solo ? 0 : (ownerIdx === 1 ? 1 : 0);   // 壊した人の側へ落とす
    G.chips.push({
      x: G.solo ? soloChipX() : pos.x,
      y: G.solo ? SOLO_CHIP_Y : pos.y,
      vx: rand(-40, 40),
      vy: (side === 0 ? 1 : -1) * rand(90, 150),
      side, t: 0,
    });
  }

  if (b.star) {
    // 見せてから自動で回収する。ブロックに阻まれて撃てず詰まるのを防ぐ
    G.gems.push({ x: pos.x, y: pos.y, r: FIELD.cell * 0.30, t: rand(0, 6),
                  taken: false, life: 0.9, owner: ownerIdx >= 0 ? ownerIdx : 0 });
    SFX.starFound();
    burst(pos.x, pos.y, '#ffd54a', 30, 300, 7);
  } else {
    // 近くにスターがあれば光の粒でそっと知らせる
    let near = false;
    for (let dc = -1; dc <= 1 && !near; dc++) {
      for (let dr = -1; dr <= 1 && !near; dr++) {
        const n = blockAt(c + dc, r + dr);
        if (n && n.star) near = true;
      }
    }
    if (near) { burst(pos.x, pos.y, '#ffd54a', 7, 90, 3); SFX.near(); }
  }
}

// 大きいブロックを壊す。4マスをまとめて消し、派手に砕く
function breakMega(mc, mr, ownerIdx) {
  const b = blockAt(mc, mr);
  if (!b) return;
  const cell = FIELD.cell;
  const cx = FIELD.x0 + (mc + 1) * cell;      // 2×2 の中心
  const cy = FIELD.y0 + (mr + 1) * cell;
  for (let dc = 0; dc <= 1; dc++) for (let dr = 0; dr <= 1; dr++) {
    FIELD.grid[idxAt(mc + dc, mr + dr)] = null;
  }
  G.score += 60;
  if (ownerIdx >= 0 && G.players[ownerIdx]) G.players[ownerIdx].dug += 4;
  SFX.blockBreak();
  const pal = BLOCK_COLORS[b.type] || BLOCK_COLORS[B_NORMAL];
  burst(cx, cy, pal.edge, 34, 360, 9);
  burst(cx, cy, '#ffffff', 12, 220, 5);
  G.shake = Math.max(G.shake, 12);
  // 掘り応えのごほうびに、かけらを必ず落とす（ひとり用は画面上部から）
  const side = G.solo ? 0 : (ownerIdx === 1 ? 1 : 0);
  G.chips.push({
    x: G.solo ? soloChipX() : cx,
    y: G.solo ? SOLO_CHIP_Y : cy,
    vx: rand(-40, 40),
    vy: (side === 0 ? 1 : -1) * rand(90, 150),
    side, t: 0,
  });
}

// 戻り値: 'none' 当たらなかった / 'blocked' 色違いで弾かれた / 'hit' 削れた
// ダメージを受けた時の共通処理。動けなくなり、ビームの強化が1段階下がる。
// すでに動けない間は重ねて下げない（連鎖爆発で一気に丸裸になるのを防ぐ）
function hurtPlayer(p, stunTime) {
  const wasStunned = p.stun > 0;
  p.stun = Math.max(p.stun, stunTime);
  if (wasStunned) return;

  SFX.stun();
  // 高く育っている方を1段階だけ削る
  if (p.beam > 0 || p.shot > 0) {
    const hitBeam = p.beam >= p.shot;
    if (hitBeam) p.beam--; else p.shot--;
    SFX.powerDown();
    burst(p.x, p.y, '#9aa4b8', 22, 260, 6);
  }
}

// 爆発。派手な光と衝撃波を出し、範囲内のプレイヤーをしばらく動けなくする
const BLAST_STUN = 2.5;                    // 巻き込まれた時に動けない秒数

function explode(x, y) {
  const radius = FIELD.cell * 2.6;   // 陣地の奥まで届く広さ
  SFX.bomb();
  G.shake = Math.max(G.shake, 26);
  G.flash = Math.min(1, G.flash + 0.75);
  G.blasts.push({ x, y, t: 0, dur: 0.55, rMax: radius });

  burst(x, y, '#ffffff', 26, 620, 9);
  burst(x, y, '#ffd54a', 34, 460, 8);
  burst(x, y, '#ff8a3c', 40, 340, 10);
  burst(x, y, '#c0392b', 22, 220, 12);

  for (const p of G.players) {
    const dx = p.x - x, dy = p.y - y;
    if (dx * dx + dy * dy < radius * radius) {     // 爆風に巻き込まれた
      // firing は落とさない。発射判定が stun を見ているので、
      // 解除と同時に自動で撃ち始められる（指を置き直す必要がない）
      hurtPlayer(p, BLAST_STUN);
      burst(p.x, p.y, '#ff8a3c', 24, 280, 6);
    }
  }
}

function damageBlock(c, r, dmg, ownerIdx, noBomb) {
  const hit = blockAt(c, r);
  if (!hit) return 'none';

  // 大きいブロックはどのマスに当たっても親（左上）の耐久を削る
  const bc = hit.slave ? c + hit.ox : c;
  const br = hit.slave ? r + hit.oy : r;
  const b = blockAt(bc, br);
  if (!b) return 'none';

  const owner = lockOwner(b.type);
  if (owner >= 0 && owner !== ownerIdx) {     // 色が違うプレイヤーの弾は通らない
    b.flash = 1;
    SFX.locked();
    const pos = cellCenter(c, r);
    burst(pos.x, pos.y, P_COLORS[owner].main, 5, 110, 3);
    return 'blocked';
  }

  b.hp -= dmg;
  b.flash = 1;
  if (b.hp <= 0) breakBlock(bc, br, ownerIdx, 0, noBomb);
  else SFX.blockHit();
  return 'hit';
}

function resetGame(solo) {
  G.solo = !!solo;
  G.stage = 1; G.score = 0; G.t = 0; G.stageT = 0;
  G.survT = 0; G.soloTier = 1; G.crush = 0; G.approach = 0; G.overInfo = null;
  G.bullets.length = 0; G.gems.length = 0; G.parts.length = 0;
  G.chips.length = 0; G.bugs.length = 0; G.bugT = 4;
  G.clones.length = 0;
  G.blasts.length = 0; G.flash = 0;
  G.celebrate = null;
  // ひとり用は青（下側）のみ。上側は生成しないので、そちらを触っても何も起きない
  G.players = G.solo ? [makePlayer(0)] : [makePlayer(0), makePlayer(1)];
  makeField(1);
  G.nextT = 0;
  G.shake = 0;
  G.banner = G.solo
    ? { text: 'せまるブロックをうち返せ！', life: 2.4 }
    : { text: 'ステージ 1', life: 1.6 };
  pointers.clear();
}

/* ---------------- 入力（マルチタッチ） ---------------- */
/* pointerId -> playerIndex。上下ゾーンで担当プレイヤーを決めるので
   2本の指が同時に押されても互いに干渉しない。 */
const pointers = new Map();

function playerForY(y) { return y > Z.cy ? 0 : 1; }

function onDown(e) {
  e.preventDefault();

  // 各種ボタンは最優先で判定（機体の移動・射撃には渡さない）
  const ex = localX(e), ey = localY(e);
  // 不正値は問答無用で破棄（機体の座標を壊すため）
  if (!isFinite(ex) || !isFinite(ey)) return;
  // 盤面の外側をタップしたらポーズ。操作中の指は横取りさせない。
  const pad = 4;
  if (ex < -pad || ey < -pad || ex > W + pad || ey > H + pad) {
    if (G.mode === 'play') { setPaused(true); SFX.ui(); }
    return;
  }
  const onBtn = (b) => {
    const dx = ex - b.x, dy = ey - b.y, hit = b.r + 10;
    return dx * dx + dy * dy < hit * hit;
  };
  if (onBtn(PAUSE.btn) && (G.mode === 'play' || G.mode === 'pause')) {
    audioResume(); SFX.ui();
    setPaused(G.mode === 'play');
    return;
  }
  if (FS.supported && onBtn(FS.btn)) { audioResume(); SFX.ui(); toggleFullscreen(); return; }
  if (AU.supported && onBtn(AU.btn)) {
    audioResume();
    setMuted(!AU.muted);
    if (!AU.muted) SFX.ui();
    return;
  }

  // 自動再生制限の解除はユーザー操作の中でしかできない
  audioResume();

  // ゲームオーバー画面はどこを触ってもタイトルへ戻る
  if (G.mode === 'over') { G.mode = 'title'; G.banner = null; pointers.clear(); SFX.ui(); return; }

  // ポーズ中はどこを触っても再開。指の位置で機体が飛ばないよう入力には使わない
  if (G.mode === 'pause') { setPaused(false); return; }

  if (G.mode === 'title') {
    const solo = inRect(MENU.solo, ex, ey);
    const duo  = inRect(MENU.duo,  ex, ey);
    if (!solo && !duo) return;                 // ボタン以外を触っても始まらない
    // 最初のタップ＝ユーザー操作なので、ここでしか全画面には入れない
    if (FS.supported && !isFullscreen()) enterFullscreen();
    resetGame(solo); G.mode = 'play';
    SFX.stage();
    // return せず、この指をそのまま操作に使う（指を置き直さなくて済む）
  }

  const idx = playerForY(ey);
  const p = G.players[idx];
  if (!p) return;

  // 明示的にキャプチャして、指が画面端に出ても追跡が切れないようにする
  try { cv.setPointerCapture(e.pointerId); } catch (_) {}

  // 同じ pointerId が別プレイヤーに残っていたら先に切り離す（idは再利用される）
  for (const q of G.players) {
    if (q === p) continue;
    const k = q.stack.indexOf(e.pointerId);
    if (k !== -1) {
      q.stack.splice(k, 1);
      if (q.pointer === e.pointerId) { q.pointer = -1; q.firing = false; }
    }
  }

  pointers.set(e.pointerId, { idx, x: ex, y: ey });
  p.stack.push(e.pointerId);        // 同じ側を複数の指で触っても取りこぼさない

  // 先に触れている指があるなら主導権は渡さない。手のひらや3本目の指が
  // 触れただけで機体が飛ぶのを防ぐ（その指は控えとしてスタックに残る）。
  if (p.pointer !== -1 && pointers.has(p.pointer)) return;

  p.pointer = e.pointerId;
  p.firing = true;
  aimFromFinger(p, ex, ey);
}

function onMove(e) {
  const rec = pointers.get(e.pointerId);
  if (!rec) return;
  e.preventDefault();
  const x = localX(e), y = localY(e);
  if (!isFinite(x) || !isFinite(y)) return;
  rec.x = x; rec.y = y;

  const p = G.players[rec.idx];
  // 操作中の指だけが機体を動かす（同じ側の他の指は位置だけ覚えておく）
  if (!p || p.pointer !== e.pointerId) return;

  // 指が画面の外へ出たら、その場で停止して撃つのもやめる。
  // 戻ってくればそのまま操作を再開する。
  const pad = 4;
  const out = x < -pad || y < -pad || x > W + pad || y > H + pad;
  p.outside = out;
  if (out) { p.firing = false; return; }

  p.firing = true;
  aimFromFinger(p, x, y);
}

function onUp(e) {
  const rec = pointers.get(e.pointerId);
  if (!rec) return;
  e.preventDefault();
  pointers.delete(e.pointerId);
  try { cv.releasePointerCapture(e.pointerId); } catch (_) {}
  const p = G.players[rec.idx];
  if (p) releasePointer(p, e.pointerId);
}

// 指を1本離す。同じ側にまだ触れている指が残っていれば操作を引き継ぐ
function releasePointer(p, id) {
  const i = p.stack.indexOf(id);
  if (i !== -1) p.stack.splice(i, 1);

  // 引き継ぎ先は「自分の操作帯に置かれた指」だけにする。
  // 相手プレイヤーが自分側にうっかり触れていた指へ引き継ぐと、
  // 機体がその指へ飛んで相手に操られる形になってしまう。
  const band = fingerBand(p);
  const slack = 60;
  let next = -1;
  for (const id2 of p.stack) {
    const rec = pointers.get(id2);
    if (!rec || rec.idx !== p.idx) continue;
    if (rec.y >= band.f0 - slack && rec.y <= band.f1 + slack) { next = id2; break; }
  }

  p.pointer = next;
  p.outside = false;
  if (next === -1) {
    p.firing = false;
    return;
  }
  p.firing = true;
  const rec = pointers.get(next);
  if (rec) aimFromFinger(p, rec.x, rec.y);
}

// アプリ切り替えなどでイベントを取りこぼしても、押しっぱなし状態を残さない
function releaseAllPointers() {
  pointers.clear();
  for (const p of G.players) { p.stack.length = 0; p.pointer = -1; p.firing = false; p.outside = false; }
}

/* ---------------- キーボード操作（PC） ----------------
   矢印キー…下側プレイヤー（ひとり用の機体）。I/J/K/M…上側プレイヤー。
   ひとり用では矢印・IJKM のどちらでも同じ機体を動かせる。
   I=上 J=左 K=右 M=下 のひし形配置。 */
const keys = new Set();
// 押されているキーから、そのプレイヤーの移動方向(-1..1)を求める
function kbdVec(idx) {
  let dx = 0, dy = 0;
  const arrows = idx === 0;                 // 下側は矢印キー
  const ijkm   = idx === 1 || G.solo;       // 上側と、ひとり用の機体は IJKM
  if (arrows) {
    if (keys.has('ArrowLeft'))  dx -= 1;
    if (keys.has('ArrowRight')) dx += 1;
    if (keys.has('ArrowUp'))    dy -= 1;
    if (keys.has('ArrowDown'))  dy += 1;
  }
  if (ijkm) {
    if (keys.has('j')) dx -= 1;
    if (keys.has('k')) dx += 1;
    if (keys.has('i')) dy -= 1;
    if (keys.has('m')) dy += 1;
  }
  return { dx, dy };
}

// キーボードで操作中の機体を動かす（毎フレーム、指の操作が無いときだけ）
function applyKeyboard(p, dt) {
  if (!p.kbd || p.pointer !== -1) return;
  const v = kbdVec(p.idx);
  const spd = W * 1.15;                      // 陣地を0.8秒ほどで横断する速さ
  if (v.dx || v.dy) {
    p.tx += v.dx * spd * dt;
    p.ty += v.dy * spd * dt;
    clampPlayer(p);
  }
  p.outside = false;
  p.firing = true;                           // キーボード中は撃ちっぱなし
  const k = 1 - Math.pow(0.0000015, dt);
  p.x += (p.tx - p.x) * k;
  p.y += (p.ty - p.y) * k;
  clampPlayer(p);
}

// このキーがどのプレイヤーのものか（-1=無関係）
function keyOwner(key) {
  if (key === 'ArrowLeft' || key === 'ArrowRight' || key === 'ArrowUp' || key === 'ArrowDown') return 0;
  if (key === 'i' || key === 'j' || key === 'k' || key === 'm') return G.solo ? 0 : 1;
  return -1;
}

function onKey(down, rawKey) {
  const key = rawKey.length === 1 ? rawKey.toLowerCase() : rawKey;
  const owner = keyOwner(key);
  if (owner === -1) return false;
  if (down) keys.add(key); else keys.delete(key);
  if (down && G.mode === 'play') {
    const p = G.players[owner];
    if (p) {
      if (!p.kbd) { p.tx = p.x; p.ty = p.y; }      // 現在位置から動き出す（飛ばない）
      p.kbd = true; p.outside = false;             // 以後この機体はキーボードで動く
    }
  }
  return true;                                     // 扱ったキー＝既定動作（ページスクロール等）を止める
}

window.addEventListener('keydown', e => {
  if (e.repeat) { if (keyOwner(e.key.length === 1 ? e.key.toLowerCase() : e.key) !== -1) e.preventDefault(); return; }
  audioResume();
  if (onKey(true, e.key)) e.preventDefault();
});
window.addEventListener('keyup', e => { if (onKey(false, e.key)) e.preventDefault(); });
// フォーカスが外れたら押しっぱなしを解除
window.addEventListener('blur', () => keys.clear());

cv.addEventListener('pointerdown',   onDown,  { passive:false });
cv.addEventListener('pointermove',   onMove,  { passive:false });
cv.addEventListener('pointerup',     onUp,    { passive:false });
cv.addEventListener('pointercancel', onUp,    { passive:false });
window.addEventListener('blur', releaseAllPointers);
document.addEventListener('visibilitychange', () => {
  if (document.hidden) { releaseAllPointers(); setPaused(true); }   // 裏に回ったら自動ポーズ
});
cv.addEventListener('contextmenu', e => e.preventDefault());
for (const g of ['gesturestart', 'gesturechange', 'gestureend']) {
  document.addEventListener(g, e => e.preventDefault());
}
document.addEventListener('touchmove', e => e.preventDefault(), { passive:false });

/* ---------------- エフェクト ---------------- */
function burst(x, y, color, n, spd, size) {
  for (let i = 0; i < n; i++) {
    const a = rand(0, TAU), s = rand(spd * 0.3, spd);
    G.parts.push({
      x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
      life: rand(0.25, 0.7), max: 0.7, color, size: rand(size * 0.5, size),
    });
  }
}

/* ---------------- 弾 ---------------- */
function playerShoot(p) {
  const big = p.charge >= p.maxCharge;
  const c = P_COLORS[p.idx];
  const muzzle = p.y + p.dirY * 20 * SHIP.scale;   // 機体の拡大に合わせて発射位置もずらす
  if (big) {
    p.charge = 0;
    // 強攻撃はまっすぐ1本に集中させる。
    // pierceLeft: 貫通できるブロック数。これが無いと列を丸ごと消してしまう。
    const lv = BEAM_LEVELS[Math.min(p.beam, BEAM_LEVELS.length - 1)];
    G.bullets.push({
      x: p.x, y: muzzle, vx: 0, vy: p.dirY * 1500,
      r: lv.r, dmg: lv.dmg, owner: p.idx,
      pierce: true, pierceLeft: lv.pierce, color: c.main,
    });
    burst(p.x, muzzle, c.main, 18, 320, 6);
    SFX.beam();
    G.shake = Math.max(G.shake, 8);
    p.cool = 0.42;
  } else {
    // 通常攻撃は扇状。横に広く掘れる代わりに1点への火力は落ちる
    const sl = SHOT_LEVELS[Math.min(p.shot, SHOT_LEVELS.length - 1)];
    const half = (sl.n - 1) / 2;
    for (let k = 0; k < sl.n; k++) {
      const a = (k - half) / Math.max(1, half) * sl.spread;
      G.bullets.push({
        x: p.x + Math.sin(a) * 14 * SHIP.scale,
        y: muzzle,
        vx: Math.sin(a) * 1150,
        vy: p.dirY * Math.cos(a) * 1150,
        r: sl.r, dmg: sl.dmg, owner: p.idx, pierce: false, color: c.main,
      });
    }
    SFX.shot(p.idx);
    p.cool = sl.cool;
  }
}

/* ---------------- 更新 ---------------- */
function update(dt) {
  G.t += dt;
  // ポーズ中は星も粒子も含めて完全に止める（表示の点滅のため G.t だけ進める）
  if (G.mode === 'pause') return;

  G.shake *= Math.pow(0.02, dt);
  if (G.banner) { G.banner.life -= dt; if (G.banner.life <= 0) G.banner = null; }

  for (const s of stars) { s.y += s.s * dt; if (s.y > H) { s.y = 0; s.x = rand(0, W); } }

  if (G.mode !== 'play') { updateParts(dt); return; }

  /* --- プレイヤー --- */
  for (const p of G.players) {
    // イベントを取りこぼしても操作不能のまま固まらないよう、毎フレーム突き合わせる
    // pointerId は離すと再利用されるため、「まだ存在するか」だけでは足りない。
    // 相手プレイヤーのものになっていたら自分のスタックから外す。
    for (let i = p.stack.length - 1; i >= 0; i--) {
      const rec = pointers.get(p.stack[i]);
      if (!rec || rec.idx !== p.idx) p.stack.splice(i, 1);
    }
    const act = p.stack.length ? p.stack[0] : -1;
    if (act !== p.pointer) {
      p.pointer = act;
      p.outside = false;
      p.firing = act !== -1;
    }

    // 指の位置へ滑らかに追従（そのままだとカクつくので補間）
    // 指が画面の外にある間は動かさない
    if (p.pointer !== -1 && !p.outside) {
      const k = 1 - Math.pow(0.0000015, dt);
      p.x += (p.tx - p.x) * k;
      p.y += (p.ty - p.y) * k;
      clampPlayer(p);
    }

    // PCのキーボード操作（指が触れていないときだけ効く）
    applyKeyboard(p, dt);

    p.stun = Math.max(0, p.stun - dt);
    p.cool -= dt;
    if (p.firing && p.stun <= 0 && p.cool <= 0) playerShoot(p);
  }

  updateClones(dt);

  /* --- ひとり用: 迫りくる畑と生存判定 --- */
  if (G.solo) {
    G.survT += dt;
    announceSoloTier();
    scrollSurvival(dt);
    const deep = survivalIntrusion();          // ライン基準の符号つき距離（越え=正）
    G.approach = deep;                          // 警告用（手前でも負の値で持つ）
    G.crush = Math.max(0, deep) / FIELD.cell;   // 負けはライン越えぶんだけ
    if (deep >= LOSE_ROWS * FIELD.cell) { triggerGameOver(); return; }
  }

  /* --- ステージ進行 --- */
  G.stageT += dt;
  if (G.nextT > 0) {
    G.nextT -= dt;
    if (G.nextT <= 0) {
      G.nextT = 0;
      G.stage++;
      G.bullets.length = 0; G.bugs.length = 0; G.clones.length = 0;
      // 強化のかけらは持ち越す（落ちてくる途中でステージが変わっても損しないように）
      G.chips = G.chips.filter(ch => ch.power);
      G.blasts.length = 0; G.flash = 0;
      makeField(G.stage);
      const debut = Object.keys(BLOCK_DEBUT).find(t => BLOCK_DEBUT[t] === G.stage);
      G.banner = debut
        ? { text: `あたらしいブロック: ${BLOCK_NAME[debut]}`, life: 2.2 }
        : { text: 'ステージ ' + G.stage, life: 1.6 };
      SFX.stage();
    }
  }

  /* --- ブロックの点滅 --- */
  for (const b of FIELD.grid) if (b && b.flash > 0) b.flash = Math.max(0, b.flash - dt * 5);
  for (const bg of G.bugs) if (bg.flash > 0) bg.flash = Math.max(0, bg.flash - dt * 5);

  /* --- プレイヤー弾 --- */
  for (let i = G.bullets.length - 1; i >= 0; i--) {
    const b = G.bullets[i];
    b.x += (b.vx || 0) * dt;
    b.y += b.vy * dt;
    if (b.y < -40 || b.y > H + 40 || b.x < -60 || b.x > W + 60) { G.bullets.splice(i, 1); continue; }

    // スターに当たったら回収
    let hitGem = false;
    for (const g of G.gems) {
      if (g.taken) continue;
      const dx = b.x - g.x, dy = b.y - g.y, rr = g.r + b.r;
      if (dx * dx + dy * dy < rr * rr) { collectGem(g, b.owner); hitGem = true; break; }
    }
    if (hitGem && !b.pierce) { G.bullets.splice(i, 1); continue; }

    // おじゃまむしに当たったら追い払う
    let hitBug = false;
    for (let k = G.bugs.length - 1; k >= 0; k--) {
      const bg = G.bugs[k];
      const dx = b.x - bg.x, dy = b.y - bg.y, rr = bg.r + b.r;
      if (dx * dx + dy * dy < rr * rr) {
        bg.hp -= b.dmg; bg.flash = 1;
        burst(b.x, b.y, '#ff7ad9', 6, 150, 4);
        if (bg.hp <= 0) {
          G.score += 150;
          SFX.bugHit();
          burst(bg.x, bg.y, '#ff7ad9', 24, 300, 6);
          // 倒したごほうびに、その場から強化のかけらを落とす
          if (dropPowerChip(b.owner, bg.x, bg.y)) {
            burst(bg.x, bg.y, '#ffffff', 16, 220, 5);
          }
          // ひとり用では、たまに爆弾のカケラも一緒に落ちる
          if (G.solo && Math.random() < BOMB_CHIP_RATE) dropBombChip(bg.x, bg.y);
          G.bugs.splice(k, 1);
        }
        hitBug = true;
        break;
      }
    }
    if (hitBug && !b.pierce) { G.bullets.splice(i, 1); continue; }

    // ブロックに当たったら削る（ひとり用は畑が流れるので scrollY を差し引く）
    const c = Math.floor((b.x - FIELD.x0) / FIELD.cell);
    const r = rowAtY(b.y);
    // 巨大レーザーは太いので、重なっている列をまとめて削る
    if (b.giant) {
      const cL = Math.floor((b.x - b.r - FIELD.x0) / FIELD.cell);
      const cR = Math.floor((b.x + b.r - FIELD.x0) / FIELD.cell);
      let center = 'none';
      for (let cc = cL; cc <= cR; cc++) {
        const res2 = damageBlock(cc, r, b.dmg, b.owner);
        if (cc === c) center = res2;
      }
      if (center !== 'none') {
        burst(b.x, b.y, b.color, 10, 240, 6);
        // 正面が色つきブロックならそこで止まる（横に掠めた分は通り抜ける）
        if (center === 'blocked') { G.bullets.splice(i, 1); continue; }
      }
      continue;
    }

    const blk = blockAt(c, r);
    if (blk) {
      const res = damageBlock(c, r, b.dmg, b.owner);
      const p = G.players[b.owner];
      // 通常弾が実際に削れた時だけチャージが溜まる
      if (p && !b.pierce && res === 'hit') {
        p.charge = Math.min(p.maxCharge, p.charge + b.dmg * 0.22);
      }
      burst(b.x, b.y, b.color, b.pierce ? 8 : 4, b.pierce ? 220 : 130, b.pierce ? 5 : 3);
      // 色つきブロックは貫通ビームでも通さない
      if (res === 'blocked') { G.bullets.splice(i, 1); continue; }
      if (!b.pierce) { G.bullets.splice(i, 1); continue; }
      if (--b.pierceLeft <= 0) { G.bullets.splice(i, 1); continue; }   // 貫通しきったら消える
    }
  }

  /* --- 掘り出されたスター --- */
  for (let i = G.gems.length - 1; i >= 0; i--) {
    const g = G.gems[i];
    g.t += dt;
    if (!g.taken) {
      g.life -= dt;
      if (g.life <= 0) collectGem(g, g.owner);     // 撃たなくても自動で手に入る
    } else {
      g.take -= dt;
      if (g.take <= 0) G.gems.splice(i, 1);
    }
  }

  /* --- かけら（拾うとチャージ） --- */
  for (let i = G.chips.length - 1; i >= 0; i--) {
    const ch = G.chips[i];
    ch.t += dt;
    ch.vy += (ch.side === 0 ? 1 : -1) * (ch.power ? 40 : 170) * dt;   // だんだん加速して落ちる
    ch.x += ch.vx * dt;
    ch.y += ch.vy * dt;
    if (ch.y < -30 || ch.y > H + 30) { G.chips.splice(i, 1); continue; }

    if (ch.power) {                                 // 光の粒をこぼしながら落ちる
      ch.trail = (ch.trail || 0) - dt;
      if (ch.trail <= 0) {
        ch.trail = 0.07;
        const a = rand(0, TAU), d = rand(10, 26);
        G.parts.push({
          x: ch.x + Math.cos(a) * d, y: ch.y + Math.sin(a) * d,
          vx: rand(-18, 18), vy: rand(-18, 18),
          life: 0.5, max: 0.7, color: '#fff8d8', size: rand(2, 4),
        });
      }
    }

    const p = G.players[ch.side];
    if (p) {
      const dx = ch.x - p.x, dy = ch.y - p.y;
      const catchR = ch.power ? 52 : 40;
      if (dx * dx + dy * dy < catchR * catchR) {    // 機体で受け止めた
        if (ch.kind === 'bomb') {                   // 畑のあちこちに爆弾を仕掛ける
          const n = sowBombBlocks(BOMB_CHIP_BLOCKS);
          G.score += 50 * n;
          SFX.powerup();                            // 仕掛けただけなので爆発音は鳴らさない
          burst(ch.x, ch.y, '#ffb347', 30, 340, 7);
          burst(ch.x, ch.y, '#ffffff', 16, 240, 5);
          G.shake = Math.max(G.shake, 12);
        } else if (ch.power) {
          p.powers++;
          if (ch.kind === 'laser') {
            fireGiantLaser(p);
          } else if (ch.kind === 'clone') {
            spawnClone(p);
          } else if (ch.kind === 'shot') {
            if (p.shot < SHOT_LEVELS.length - 1) p.shot++;
          } else {
            if (p.beam < BEAM_LEVELS.length - 1) p.beam++;
            p.charge = p.maxCharge;
          }
          G.score += 300;
          if (ch.kind !== 'laser') SFX.powerup();
          burst(ch.x, ch.y, P_COLORS[p.idx].main, 34, 380, 8);
          burst(ch.x, ch.y, '#ffffff', 18, 260, 5);
          G.shake = Math.max(G.shake, 12);
        } else {
          p.charge = Math.min(p.maxCharge, p.charge + 25);
          p.caught++;
          G.score += 50;
          SFX.chip();
          burst(ch.x, ch.y, '#9cff8a', 12, 180, 4);
          // 一定数あつめるごとに、ビーム強化のかけらを落とす
          if (p.caught % CHIPS_PER_POWER === 0) dropPowerChip(p.idx);
        }
        G.chips.splice(i, 1);
      }
    }
  }

  /* --- 節目のお祝い --- */
  if (G.celebrate) {
    const cb = G.celebrate;
    cb.t += dt;
    cb.fw -= dt;
    if (cb.fw <= 0 && cb.t < cb.dur - 0.6) {
      cb.fw = 0.22;
      const hue = Math.floor(rand(0, 360));
      const fx = rand(W * 0.15, W * 0.85);
      const fy = rand(Z.top.y0, Z.bot.y1);
      burst(fx, fy, `hsl(${hue},95%,65%)`, 26, 420, 6);
      burst(fx, fy, '#ffffff', 10, 300, 4);
      SFX.firework();
    }
    if (cb.t >= cb.dur) G.celebrate = null;
  }

  /* --- 爆発の衝撃波と閃光 --- */
  G.flash = Math.max(0, G.flash - dt * 3.4);
  for (let i = G.blasts.length - 1; i >= 0; i--) {
    const bl = G.blasts[i];
    bl.t += dt;
    if (bl.t >= bl.dur) G.blasts.splice(i, 1);
  }

  /* --- おじゃまむし --- */
  G.bugT -= dt;
  if (G.bugT <= 0) {
    G.bugT = stageSetup(G.solo ? soloStage() : G.stage).bugEvery * rand(0.8, 1.25);
    spawnBug();
  }
  for (let i = G.bugs.length - 1; i >= 0; i--) {
    const bg = G.bugs[i];
    bg.t += dt;
    bg.y += bg.vy * dt;
    bg.x += Math.sin(bg.t * 2.4) * 70 * dt;
    if (bg.y < -40 || bg.y > H + 40) { G.bugs.splice(i, 1); continue; }

    const p = G.players[bg.side];
    if (p && p.stun <= 0) {
      const dx = bg.x - p.x, dy = bg.y - p.y, rr = bg.r + SHIP.hit;
      if (dx * dx + dy * dy < rr * rr) {           // ぶつかった＝しばらく動けない
        hurtPlayer(p, 1.1);
        G.shake = Math.max(G.shake, 12);
        burst(bg.x, bg.y, '#ff7ad9', 22, 260, 5);
        G.bugs.splice(i, 1);
      }
    }
  }

  updateParts(dt);
  bgmUpdate();
}


// ビーム強化のかけら。ゆっくり落ちてくるので受け止めやすい
// 強化アイテムの種類を決める。両方を代わるがわる、上限に達した方は飛ばす
function nextPowerKind(p) {
  const room = { beam: p.beam < BEAM_LEVELS.length - 1, shot: p.shot < SHOT_LEVELS.length - 1 };
  if (!room.beam && !room.shot) return null;
  const first = POWER_KINDS[p.powers % POWER_KINDS.length];
  return room[first] ? first : (first === 'beam' ? 'shot' : 'beam');
}

// x, y を渡すとその場から落ちる（省略すると畑の縁から）。
// ひとり用でも、倒したおじゃまむしの位置など座標が指定されていればそこから出す。
// 座標なし（かけらを一定数あつめた時）だけ、畑と同じく画面上部から降らせる。
function dropPowerChip(idx, x, y) {
  if (!FIELD.cell) return false;
  const p = G.players[idx];
  if (!p) return false;
  // 両方とも最大まで強化済みなら、代わりに巨大レーザーの球を落とす。
  // そのうちいくらかは分身のかけらに化ける
  const kind = nextPowerKind(p) ||
               (Math.random() < CLONE_CHIP_RATE ? 'clone' : 'laser');
  const fromTop = G.solo && x === undefined;
  const side = G.solo ? 0 : (idx === 1 ? 1 : 0);
  G.chips.push({
    x: fromTop ? soloChipX() : (x !== undefined ? x : rand(FIELD.x0 + 30, FIELD.x0 + FIELD.cols * FIELD.cell - 30)),
    y: fromTop ? SOLO_CHIP_Y : (y !== undefined ? y : (side === 0 ? FIELD.y0 + FIELD.rows * FIELD.cell : FIELD.y0)),
    vx: rand(-25, 25),
    vy: (side === 0 ? 1 : -1) * 60,
    side, t: 0, power: true, kind,
  });
  SFX.powerDrop();
  return true;
}

/* ============================================================
   ひとり用: 爆弾のカケラ
   おじゃまむしを倒すと、たまにこれも落ちる。受け止めると畑のあちこちが
   爆弾ブロックに変わるので、そこを撃てば固まった畑をまとめて崩せる。
============================================================ */
const BOMB_CHIP_RATE = 0.2;        // おじゃまむしを倒したときに出る確率
const BOMB_CHIP_BLOCKS = 6;        // 一度に爆弾へ変えるブロックの数

function dropBombChip(x, y) {
  if (!FIELD.cell) return false;
  G.chips.push({
    x, y, vx: rand(-25, 25), vy: 60,
    side: 0, t: 0, power: true, kind: 'bomb',
  });
  SFX.powerDrop();
  return true;
}

// 画面に映っているブロックを count 個ぶんランダムに選び、爆弾ブロックへ変える
function sowBombBlocks(count) {
  const pool = [];
  for (let r = 0; r < FIELD.rows; r++) {
    for (let c = 0; c < FIELD.cols; c++) {
      const b = FIELD.grid[idxAt(c, r)];
      // 大きいブロックは4マスで1つの作りなので触らない。スター入りも避ける
      if (!b || b.mega || b.slave || b.star || b.type === B_BOMB) continue;
      const y = cellCenter(c, r).y;
      if (y < 0 || y > H) continue;                  // 画面の外は変えない
      pool.push({ c, r, b });
    }
  }
  let made = 0;
  while (made < count && pool.length) {
    const k = Math.floor(rand(0, pool.length));
    const { c, r, b } = pool[k];
    pool.splice(k, 1);
    b.type = B_BOMB;
    b.hp = b.maxHp = BLOCK_HP[B_BOMB];
    b.cracks = null;                                 // 硬いブロックの亀裂は持ち越さない
    b.flash = 1;                                     // 変わった瞬間だけ白く光る
    const pos = cellCenter(c, r);
    burst(pos.x, pos.y, '#ffb347', 8, 170, 4);
    made++;
  }
  return made;
}

/* ============================================================
   分身
   強化しきったあとに落ちてくる「レーザーのかけら」の代わりに、
   ときどきこちらが落ちてくる。受け止めると、機体が動ける枠の中を
   本人と逆向きに動くピンクの分身が、数秒だけ並んで撃ちこむ。
============================================================ */
const CLONE_CHIP_RATE = 1 / 3;     // レーザーのかけらの代わりに分身のかけらが出る確率
const CLONE_TIME = 5;              // 分身がいる時間（秒）
const CLONE_COLOR = { main:'#ff5cc8', glow:'#f0a' };

// 分身の位置は、機体が動ける枠の中で本人を点対称にうつしたところ。
// 本人が右へ動けば分身は左へ、下がれば分身は上がる。
function clonePos(p) {
  const rc = zoneRect(p.bottom);
  return { x: rc.x0 + rc.x1 - p.x, y: rc.y0 + rc.y1 - p.y };
}

function spawnClone(p) {
  const pos = clonePos(p);
  G.clones.push({
    idx: p.idx, bottom: p.bottom, dirY: p.dirY,
    x: pos.x, y: pos.y, life: CLONE_TIME, cool: 0,
    // 見た目は本人と同じ豪華さにする（drawShip をそのまま使うための一式）
    shot: p.shot, beam: p.beam, charge: 0, maxCharge: 100,
    pointer: -1, stun: 0,
  });
  burst(pos.x, pos.y, CLONE_COLOR.main, 30, 360, 7);
  G.shake = Math.max(G.shake, 10);
  G.banner = { text: 'ぶんしん とうじょう！', life: 1.8 };
}

function updateClones(dt) {
  for (let i = G.clones.length - 1; i >= 0; i--) {
    const cl = G.clones[i];
    const p = G.players[cl.idx];
    cl.life -= dt;
    if (cl.life <= 0 || !p) {
      burst(cl.x, cl.y, CLONE_COLOR.main, 22, 300, 6);
      G.clones.splice(i, 1);
      continue;
    }
    const pos = clonePos(p);
    cl.x = pos.x; cl.y = pos.y;
    cl.shot = p.shot; cl.beam = p.beam;     // 途中で強化されたら分身にも反映する
    cl.cool -= dt;
    if (cl.cool <= 0) cloneShoot(cl);
  }
}

// 分身が撃つのは扇状ビームだけ（強攻撃は本人の特権）
function cloneShoot(cl) {
  const sl = SHOT_LEVELS[Math.min(cl.shot, SHOT_LEVELS.length - 1)];
  const half = (sl.n - 1) / 2;
  const muzzle = cl.y + cl.dirY * 20 * SHIP.scale;
  for (let k = 0; k < sl.n; k++) {
    const a = (k - half) / Math.max(1, half) * sl.spread;
    G.bullets.push({
      x: cl.x + Math.sin(a) * 14 * SHIP.scale,
      y: muzzle,
      vx: Math.sin(a) * 1150,
      vy: cl.dirY * Math.cos(a) * 1150,
      // 弾の持ち主は本人。色つきブロックも本人と同じように壊せる
      r: sl.r, dmg: sl.dmg, owner: cl.idx, pierce: false, color: CLONE_COLOR.main,
    });
  }
  SFX.shot(1);                              // 本人より高い音で、分身の弾だと分かるように
  cl.cool = sl.cool;
}

// 取った瞬間に前方へ撃つ巨大レーザー。
// 威力は最大まで強化したビームと同じで、色つきブロック以外は貫通していく。
function fireGiantLaser(p) {
  const top = BEAM_LEVELS[BEAM_LEVELS.length - 1];
  const muzzle = p.y + p.dirY * 20 * SHIP.scale;
  G.bullets.push({
    x: p.x, y: muzzle, vx: 0, vy: p.dirY * 1400,
    r: 60, dmg: top.dmg, owner: p.idx,
    pierce: true, pierceLeft: Infinity, giant: true,
    color: P_COLORS[p.idx].main,
  });
  burst(p.x, muzzle, '#ffffff', 26, 420, 8);
  G.shake = Math.max(G.shake, 20);
  G.flash = Math.min(1, G.flash + 0.5);
  SFX.giantLaser();
}

function spawnBug() {
  if (!FIELD.cell) return;
  if (G.solo) {                                   // 迫る畑の隙間から機体めがけて降りてくる
    G.bugs.push({
      x: rand(FIELD.x0 + 20, FIELD.x0 + FIELD.cols * FIELD.cell - 20),
      y: Z.top.y1, vy: rand(70, 110),
      r: 17, hp: 16, side: 0, t: rand(0, 6), flash: 0,
    });
    SFX.bugOut();
    return;
  }
  const side = Math.random() < 0.5 ? 0 : 1;       // どちらの陣地へ向かうか
  const fy0 = FIELD.y0, fy1 = FIELD.y0 + FIELD.rows * FIELD.cell;
  G.bugs.push({
    x: rand(FIELD.x0 + 20, FIELD.x0 + FIELD.cols * FIELD.cell - 20),
    y: side === 0 ? fy1 : fy0,                    // 向かう側の畑の縁から出る
    vy: (side === 0 ? 1 : -1) * rand(70, 110),
    r: 17, hp: 16, side, t: rand(0, 6), flash: 0,
  });
  SFX.bugOut();
}

const GEM_POP = 1.1;   // ゲット演出の長さ（秒）

function collectGem(g, ownerIdx) {
  if (g.taken) return;
  g.taken = true; g.take = GEM_POP;   // 拡大しながら回転する演出の時間
  G.starsFound++;
  G.score += 1000;
  const p = G.players[ownerIdx];
  if (p) { p.stars++; p.charge = p.maxCharge; }
  SFX.starGet();
  burst(g.x, g.y, '#ffd54a', 46, 420, 9);
  burst(g.x, g.y, '#fff6c8', 18, 220, 6);
  G.shake = Math.max(G.shake, 12);

  if (!G.solo && G.starsFound >= G.starsTotal) {
    G.score += 500 * G.stage;
    // 10ステージごとは節目として、長めのお祝いを挟む
    const milestone = G.stage % 10 === 0;
    if (milestone) {
      G.score += 5000;
      G.celebrate = { t: 0, dur: 5.0, stage: G.stage, fw: 0 };
      SFX.milestone();
      G.nextT = 5.0;
    } else {
      G.banner = { text: 'ステージ クリア！', life: 2.0 };
      SFX.clear();
      G.nextT = 2.2;
    }
  }
}

function updateParts(dt) {
  for (let i = G.parts.length - 1; i >= 0; i--) {
    const p = G.parts[i];
    p.life -= dt;
    if (p.life <= 0) { G.parts.splice(i, 1); continue; }
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vx *= Math.pow(0.15, dt); p.vy *= Math.pow(0.15, dt);
  }
}

/* ---------------- 描画 ---------------- */
function draw() {
  ctx.save();
  if (G.shake > 0.3) ctx.translate(rand(-G.shake, G.shake), rand(-G.shake, G.shake));

  // 背景
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0,   '#120a22');
  g.addColorStop(0.5, '#05060f');
  g.addColorStop(1,   '#02141f');
  ctx.fillStyle = g; ctx.fillRect(-40, -40, W + 80, H + 80);

  ctx.fillStyle = '#ffffff';
  for (const s of stars) { ctx.globalAlpha = s.a * 0.7; ctx.fillRect(s.x, s.y, s.r, s.r); }
  ctx.globalAlpha = 1;

  drawArena();

  if (G.mode !== 'title') {
    drawField();
    drawBugs();
    drawChips();
    drawGems();
    drawBlasts();
    for (const b of G.bullets) drawBullet(b);
    for (const p of G.players) drawShip(p);
    drawClones();
    drawParts();
    drawHUD();
  } else {
    drawParts();
  }

  ctx.restore();

  if (G.flash > 0.01) {                 // 爆発の瞬間だけ画面が白く飛ぶ
    ctx.save();
    ctx.globalAlpha = Math.min(0.45, G.flash * 0.45);
    ctx.fillStyle = '#fff6e0';
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }

  if (G.celebrate) drawCelebrate();
  if (G.mode === 'title') drawTitle();
  if (G.mode === 'pause') drawPauseOverlay();
  if (G.mode === 'over') drawGameOver();
  if (G.banner && G.mode !== 'over') drawBanner(G.banner);
  // オーバーレイに隠れず、画面揺れの影響も受けないよう最後に描く
  drawFsButton();
  drawMuteButton();
  drawPauseButton();
}

function drawArena() {
  // 中央帯（敵ゾーン）
  ctx.save();
  const bandH = H * 0.2;
  const bg = ctx.createLinearGradient(0, Z.cy - bandH, 0, Z.cy + bandH);
  bg.addColorStop(0, 'rgba(255,255,255,0)');
  bg.addColorStop(0.5, 'rgba(90,150,255,0.07)');
  bg.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = bg;
  ctx.fillRect(0, Z.cy - bandH, W, bandH * 2);

  ctx.strokeStyle = 'rgba(255,255,255,0.10)';
  ctx.lineWidth = 1;
  ctx.setLineDash([12, 10]);
  for (const y of [Z.cy - bandH * 0.55, Z.cy + bandH * 0.55]) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  ctx.setLineDash([]);

  // 各プレイヤーの可動域。枠の線がそのまま機体の動ける範囲を示す
  for (let i = 0; i < 2; i++) {
    const r = zoneRect(i === 0);
    const pad = 14;                                   // 機体の見た目ぶんだけ外へ広げる
    const x = r.x0 - pad, y = r.y0 - pad;
    const w = (r.x1 - r.x0) + pad * 2, h = (r.y1 - r.y0) + pad * 2;
    const col = P_COLORS[i].main;

    ctx.fillStyle = col;                              // ごく薄い塗りで領域を示す
    ctx.globalAlpha = 0.05;
    roundRect(ctx, x, y, w, h, 16); ctx.fill();

    ctx.strokeStyle = col;                            // 破線の枠
    ctx.globalAlpha = 0.34;
    ctx.lineWidth = 2;
    ctx.setLineDash([10, 8]);
    roundRect(ctx, x, y, w, h, 16); ctx.stroke();
    ctx.setLineDash([]);

    ctx.globalAlpha = 0.85;                           // 四隅は太い実線で強調
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    const L = Math.min(34, w * 0.22, h * 0.32);
    for (const sx of [0, 1]) for (const sy of [0, 1]) {
      const cx = sx ? x + w : x, cy = sy ? y + h : y;
      const dx = sx ? -1 : 1,   dy = sy ? -1 : 1;
      ctx.beginPath();
      ctx.moveTo(cx + dx * L, cy);
      ctx.lineTo(cx + dx * 12, cy);
      ctx.quadraticCurveTo(cx, cy, cx, cy + dy * 12);
      ctx.lineTo(cx, cy + dy * L);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }
  ctx.restore();
}

function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.arcTo(x + w, y, x + w, y + h, r);
  c.arcTo(x + w, y + h, x, y + h, r);
  c.arcTo(x, y + h, x, y, r);
  c.arcTo(x, y, x + w, y, r);
  c.closePath();
}

// 分身。姿は本人と同じで色だけピンク。消える間際は点滅して知らせる
function drawClones() {
  for (const cl of G.clones) {
    if (cl.life < 1.2 && Math.floor(cl.life * 10) % 2 === 0) continue;
    // 足もとに広がる淡い光。本人と見分けやすくする
    ctx.save();
    const halo = ctx.createRadialGradient(cl.x, cl.y, 0, cl.x, cl.y, 46);
    halo.addColorStop(0, 'rgba(255,92,200,0.35)');
    halo.addColorStop(1, 'rgba(255,92,200,0)');
    ctx.fillStyle = halo;
    ctx.beginPath(); ctx.arc(cl.x, cl.y, 46, 0, TAU); ctx.fill();
    ctx.restore();
    drawShip(cl, CLONE_COLOR);
  }
}

// col を渡すと機体の色を差し替える（分身用）
function drawShip(p, col) {
  const c = col || P_COLORS[p.idx];
  // 指と機体をつなぐガイド（オフセットしていることが直感的にわかるように）
  if (p.pointer !== -1 && !p.outside) {
    ctx.save();
    ctx.globalAlpha = 0.28;
    ctx.strokeStyle = c.main;
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 6]);
    ctx.beginPath(); ctx.moveTo(p.fx, p.fy); ctx.lineTo(p.x, p.y); ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 0.22;
    ctx.beginPath(); ctx.arc(p.fx, p.fy, 22, 0, TAU); ctx.stroke();
    ctx.restore();
  }

  // 強化の合計段階だけ機体が豪華になる（0〜6）
  const tier = p.shot + p.beam;
  const dull = p.stun > 0;
  const body = dull ? '#9aa4b8' : c.main;
  const trim = dull ? '#c3cad6' : '#ffffff';

  ctx.save();
  ctx.translate(p.x, p.y);
  const grow = SHIP.scale * (1 + tier * 0.022);       // 段階が上がるとわずかに大型化
  ctx.scale(grow, p.bottom ? grow : -grow);

  if (p.stun > 0 && Math.floor(p.stun * 14) % 2 === 0) ctx.globalAlpha = 0.4;

  // --- エンジン炎（段階が上がると左右にも吹く） ---
  const flame = 12 + Math.sin(G.t * 30) * 4;
  const nozzles = tier >= 2 ? [[0, 1], [-9, 0.6], [9, 0.6]] : [[0, 1]];
  for (const [ox, sc] of nozzles) {
    const fg = ctx.createLinearGradient(0, 14, 0, 14 + flame * sc);
    fg.addColorStop(0, body); fg.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = fg;
    ctx.beginPath();
    ctx.moveTo(ox - 7 * sc, 14); ctx.lineTo(ox + 7 * sc, 14);
    ctx.lineTo(ox, 14 + flame * sc);
    ctx.closePath(); ctx.fill();
  }

  ctx.shadowColor = c.glow; ctx.shadowBlur = 18 + tier * 3;

  // --- 主翼（段階1から。3以上でもう一枚重なる） ---
  if (tier >= 1) {
    ctx.save();
    ctx.fillStyle = body;
    ctx.globalAlpha *= 0.85;
    for (const sx of [-1, 1]) {
      ctx.beginPath();
      ctx.moveTo(sx * 6, -2); ctx.lineTo(sx * (20 + tier), 12);
      ctx.lineTo(sx * (12 + tier * 0.5), 13); ctx.lineTo(sx * 5, 6);
      ctx.closePath(); ctx.fill();
    }
    if (tier >= 3) {
      for (const sx of [-1, 1]) {
        ctx.beginPath();
        ctx.moveTo(sx * 5, -12); ctx.lineTo(sx * 17, -1);
        ctx.lineTo(sx * 11, 1); ctx.lineTo(sx * 4, -6);
        ctx.closePath(); ctx.fill();
      }
    }
    ctx.restore();
  }

  // --- 本体 ---
  ctx.fillStyle = body;
  ctx.beginPath();
  ctx.moveTo(0, -20); ctx.lineTo(14, 10); ctx.lineTo(6, 6);
  ctx.lineTo(0, 13);  ctx.lineTo(-6, 6); ctx.lineTo(-14, 10);
  ctx.closePath(); ctx.fill();

  // --- 段階4以上は縁取りが入る ---
  if (tier >= 4) {
    ctx.strokeStyle = trim;
    ctx.lineWidth = 1.6;
    ctx.stroke();
  }

  ctx.shadowBlur = 0;

  // --- 機首の飾り（段階2以上） ---
  if (tier >= 2) {
    ctx.fillStyle = trim;
    ctx.beginPath();
    ctx.moveTo(0, -24 - tier); ctx.lineTo(3, -18); ctx.lineTo(-3, -18);
    ctx.closePath(); ctx.fill();
  }

  // --- コックピット ---
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath(); ctx.arc(0, -4, 3.6 + tier * 0.25, 0, TAU); ctx.fill();

  // --- 段階5以上は周りを回る光球 ---
  if (tier >= 5) {
    const orbs = tier >= 6 ? 3 : 2;
    for (let i = 0; i < orbs; i++) {
      const a = G.t * 2.2 + (i / orbs) * TAU;
      ctx.fillStyle = trim;
      ctx.shadowColor = c.glow; ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.arc(Math.cos(a) * 22, Math.sin(a) * 22 * 0.6, 3, 0, TAU);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }

  // --- 最大強化はきらめきを散らす ---
  if (tier >= 6) {
    ctx.save();
    ctx.strokeStyle = '#fff3b0';
    ctx.globalAlpha *= 0.5 + 0.5 * Math.sin(G.t * 8);
    ctx.lineWidth = 1.4;
    for (let i = 0; i < 4; i++) {
      const a = G.t * 1.3 + i * TAU / 4;
      const rx = Math.cos(a) * 27, ry = Math.sin(a) * 27 * 0.6;
      ctx.beginPath();
      ctx.moveTo(rx - 3, ry); ctx.lineTo(rx + 3, ry);
      ctx.moveTo(rx, ry - 3); ctx.lineTo(rx, ry + 3);
      ctx.stroke();
    }
    ctx.restore();
  }

  // チャージ満タンのオーラ
  if (p.charge >= p.maxCharge) {
    ctx.strokeStyle = '#fff';
    ctx.globalAlpha = 0.4 + 0.4 * Math.sin(G.t * 14);
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, 0, 26 + Math.sin(G.t * 10) * 3, 0, TAU); ctx.stroke();
  }
  ctx.restore();
}

function drawField() {
  const cell = FIELD.cell;
  if (!cell) return;
  if (G.solo) drawDangerLine();
  ctx.save();
  const sY = FIELD.scrollY;                   // 畑の下降ぶん（ふたり用は0）
  for (let r = 0; r < FIELD.rows; r++) {
    for (let c = 0; c < FIELD.cols; c++) {
      const b = FIELD.grid[idxAt(c, r)];
      if (!b || b.slave) continue;             // 子マスは親がまとめて描く
      const span = b.mega ? 2 : 1;             // 大きいブロックは2マスぶん
      const x = FIELD.x0 + c * cell, y = FIELD.y0 + r * cell + sY;
      const pad = cell * 0.055;
      const w = cell * span - pad * 2;
      const wear = b.hp / b.maxHp;             // 削れるほど暗く小さくなる

      const pal = BLOCK_COLORS[b.type] || BLOCK_COLORS[B_NORMAL];
      const base = b.type === B_LOCK0 ? '#12688a'
                 : b.type === B_LOCK1 ? '#8a2764' : pal.base;
      const edge = b.type === B_LOCK0 ? P_COLORS[0].main
                 : b.type === B_LOCK1 ? P_COLORS[1].main : pal.edge;

      ctx.globalAlpha = 0.45 + 0.55 * wear;
      ctx.fillStyle = b.flash > 0 ? '#ffffff' : base;
      roundRect(ctx, x + pad, y + pad, w, w, cell * 0.16);
      ctx.fill();

      ctx.globalAlpha = (0.5 + 0.5 * wear) * 0.9;
      ctx.strokeStyle = edge;
      ctx.lineWidth = b.mega ? 3 : 2;
      roundRect(ctx, x + pad, y + pad, w, w, cell * 0.16);
      ctx.stroke();

      if (b.type === B_BOMB) {                 // 爆弾の絵柄
        drawBombIcon(x + cell / 2, y + cell / 2, cell);
      } else if (b.type === B_LOCK0 || b.type === B_LOCK1) {
        drawLockIcon(x + cell / 2, y + cell / 2, cell, lockOwner(b.type));
      } else if (b.type === B_BRICK || b.type === B_ROCK || b.type === B_DIAMOND) {
        drawHardPattern(b.type, x + pad, y + pad, w, edge);
        // 削れるほど亀裂が広がり、割れる直前がひと目で分かる
        if (wear < 1) {
          if (!b.cracks) b.cracks = makeCracks(b.mega ? 9 : 4);
          drawCracks(x + pad, y + pad, w, b.cracks, 1 - wear);
        }
      }
      ctx.globalAlpha = 1;
    }
  }
  ctx.restore();
}

// ひとり用の自陣ライン。越えられているほど赤く強く光り、危険帯を染める
function drawDangerLine() {
  const dy = FIELD.dangerY;
  if (!dy) return;
  // ラインを越える前から光り始める。あと WARN_LEAD 行に迫ったら 0 から立ち上がり、
  // LOSE_ROWS 行ぶん越えた（＝負け）ところで 1 になる。
  const lead = WARN_LEAD * FIELD.cell;
  const warn = clamp((G.approach + lead) / (lead + LOSE_ROWS * FIELD.cell), 0, 1);
  const pulse = 0.6 + 0.4 * Math.sin(G.t * 8);
  ctx.save();
  // 越えられているぶんだけ危険帯を赤く塗る
  if (warn > 0) {
    ctx.globalAlpha = (0.10 + 0.22 * warn) * pulse;
    ctx.fillStyle = '#ff3b30';
    ctx.fillRect(0, dy, W, H - dy);
  }
  // ライン本体
  ctx.globalAlpha = 0.5 + 0.5 * warn * pulse;
  ctx.strokeStyle = warn > 0.02 ? '#ff5a48' : 'rgba(255,150,90,0.6)';
  ctx.lineWidth = 2 + 2 * warn;
  ctx.setLineDash([16, 12]);
  ctx.beginPath(); ctx.moveTo(0, dy); ctx.lineTo(W, dy); ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

// ブロックごとに一度だけ亀裂の形を作る（0..1 の相対座標で持つ）。
// 中ほどから外へ、少し折れながら伸びる線を count 本ぶん用意する。
function makeCracks(count) {
  const cracks = [];
  for (let i = 0; i < count; i++) {
    let x = 0.28 + Math.random() * 0.44;       // 内側のどこかから始める
    let y = 0.28 + Math.random() * 0.44;
    let ang = Math.random() * TAU;
    const segs = 2 + Math.floor(Math.random() * 3);
    const pts = [{ x, y }];
    for (let k = 0; k < segs; k++) {
      ang += (Math.random() - 0.5) * 1.2;      // ジグザグに曲がる
      const len = 0.12 + Math.random() * 0.16;
      x = clamp(x + Math.cos(ang) * len, 0.06, 0.94);
      y = clamp(y + Math.sin(ang) * len, 0.06, 0.94);
      pts.push({ x, y });
    }
    cracks.push(pts);
  }
  return cracks;
}

// ダメージ（0..1）に応じて亀裂を順に見せ、割れる直前ほど深く伸ばす
function drawCracks(px, py, w, cracks, damage) {
  const n = cracks.length;
  const shown = Math.min(n, Math.ceil(n * damage));
  if (shown <= 0) return;
  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  for (let i = 0; i < shown; i++) {
    const pts = cracks[i];
    // この亀裂が伸びきるまでの成長ぐあい（0..1）
    const grow = clamp((damage - i / n) * n, 0, 1);
    const upto = Math.max(2, Math.ceil((pts.length - 1) * grow) + 1);
    // 暗い溝
    ctx.globalAlpha = 0.3 + 0.55 * damage;
    ctx.strokeStyle = 'rgba(8,10,16,0.9)';
    ctx.lineWidth = Math.max(1, w * (0.02 + 0.02 * damage));
    ctx.beginPath();
    ctx.moveTo(px + pts[0].x * w, py + pts[0].y * w);
    for (let k = 1; k < upto; k++) ctx.lineTo(px + pts[k].x * w, py + pts[k].y * w);
    ctx.stroke();
    // 割れ目のふちに入るわずかな光
    ctx.globalAlpha = 0.18 * damage;
    ctx.strokeStyle = 'rgba(255,255,255,0.9)';
    ctx.lineWidth = Math.max(0.6, w * 0.008);
    ctx.stroke();
  }
  ctx.restore();
}

const BLOCK_COLORS = {
  [B_NORMAL]:  { base:'#2f5f9e', edge:'#7fb2ff' },
  [B_BRICK]:   { base:'#8c4630', edge:'#e59162' },
  [B_ROCK]:    { base:'#6b7078', edge:'#c0c7d2' },
  [B_DIAMOND]: { base:'#1d7f9c', edge:'#9af0ff' },
  [B_BOMB]:    { base:'#5a4a52', edge:'#b9a6ae' },
  [B_LOCK0]:   { base:'#12688a', edge:'#31e6ff' },
  [B_LOCK1]:   { base:'#8a2764', edge:'#ff5cc8' },
};

// 硬さが一目で分かるよう、種類ごとに違う模様を入れる
function drawHardPattern(type, x, y, w, edge) {
  ctx.save();
  ctx.globalAlpha = 0.75;
  ctx.strokeStyle = edge;
  ctx.fillStyle = edge;
  ctx.lineWidth = Math.max(1, w * 0.035);

  if (type === B_BRICK) {                       // レンガ: 目地を互い違いに
    for (let i = 1; i < 3; i++) {
      const yy = y + (w * i) / 3;
      ctx.beginPath(); ctx.moveTo(x, yy); ctx.lineTo(x + w, yy); ctx.stroke();
    }
    for (let i = 0; i < 3; i++) {
      const yy = y + (w * i) / 3;
      const xx = x + (i % 2 === 0 ? w / 2 : w / 4);
      ctx.beginPath(); ctx.moveTo(xx, yy); ctx.lineTo(xx, yy + w / 3); ctx.stroke();
      if (i % 2 === 0) {
        ctx.beginPath(); ctx.moveTo(xx + w / 2, yy); ctx.lineTo(xx + w / 2, yy + w / 3); ctx.stroke();
      }
    }
  } else if (type === B_ROCK) {                 // いわ: ごつごつした欠け
    ctx.globalAlpha = 0.5;
    ctx.beginPath();
    ctx.moveTo(x + w * 0.2, y + w * 0.3); ctx.lineTo(x + w * 0.45, y + w * 0.18);
    ctx.lineTo(x + w * 0.6, y + w * 0.42); ctx.lineTo(x + w * 0.34, y + w * 0.55);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x + w * 0.55, y + w * 0.62); ctx.lineTo(x + w * 0.82, y + w * 0.55);
    ctx.lineTo(x + w * 0.78, y + w * 0.84); ctx.lineTo(x + w * 0.52, y + w * 0.8);
    ctx.closePath(); ctx.fill();
  } else {                                      // ダイヤ: 面取りときらめき
    const cx = x + w / 2, cy = y + w / 2, r = w * 0.30;
    ctx.beginPath();
    ctx.moveTo(cx, cy - r); ctx.lineTo(cx + r, cy);
    ctx.lineTo(cx, cy + r); ctx.lineTo(cx - r, cy);
    ctx.closePath(); ctx.stroke();
    ctx.globalAlpha = 0.45;
    ctx.beginPath();
    ctx.moveTo(cx - r, cy); ctx.lineTo(cx + r, cy);
    ctx.moveTo(cx, cy - r); ctx.lineTo(cx, cy + r);
    ctx.stroke();
    ctx.globalAlpha = 0.5 + 0.5 * Math.sin(G.t * 4 + x);
    ctx.beginPath(); ctx.arc(cx - r * 0.35, cy - r * 0.35, w * 0.05, 0, TAU); ctx.fill();
  }
  ctx.restore();
}

// 爆弾の絵柄（丸い本体＋導火線＋火花）
function drawBombIcon(cx, cy, cell) {
  const r = cell * 0.20;
  ctx.save();
  ctx.globalAlpha = 1;
  ctx.translate(cx, cy + r * 0.18);

  ctx.fillStyle = '#15111a';                       // 本体
  ctx.beginPath(); ctx.arc(0, 0, r, 0, TAU); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.45)';        // つや
  ctx.beginPath(); ctx.arc(-r * 0.34, -r * 0.36, r * 0.24, 0, TAU); ctx.fill();

  ctx.fillStyle = '#15111a';                       // 口金
  ctx.fillRect(-r * 0.30, -r * 1.22, r * 0.60, r * 0.42);

  ctx.strokeStyle = '#d8b070';                     // 導火線
  ctx.lineWidth = Math.max(1.6, r * 0.16);
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(0, -r * 1.2);
  ctx.quadraticCurveTo(r * 0.75, -r * 1.75, r * 0.5, -r * 2.15);
  ctx.stroke();

  const tw = 0.6 + 0.4 * Math.sin(G.t * 14 + cx);  // 火花
  ctx.fillStyle = '#ffd54a';
  ctx.shadowColor = '#ff9a3c'; ctx.shadowBlur = 12 * tw;
  ctx.beginPath(); ctx.arc(r * 0.5, -r * 2.25, r * 0.28 * tw, 0, TAU); ctx.fill();
  ctx.restore();
}

// 色つきブロックには、その色のプレイヤーの機体を描いて誰が壊せるか示す
function drawLockIcon(cx, cy, cell, owner) {
  const r = cell * 0.22;
  ctx.save();
  ctx.globalAlpha = 1;
  ctx.translate(cx, cy);
  ctx.scale(1, owner === 0 ? 1 : -1);              // 下の人は上向き、上の人は下向き
  ctx.fillStyle = '#ffffff';
  ctx.shadowColor = P_COLORS[owner].glow; ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.moveTo(0, -r); ctx.lineTo(r * 0.78, r * 0.62); ctx.lineTo(0, r * 0.24);
  ctx.lineTo(-r * 0.78, r * 0.62);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawBlasts() {
  ctx.save();
  for (const bl of G.blasts) {
    const q = clamp(bl.t / bl.dur, 0, 1);

    // 内側の火球（すぼみながら消える）
    const fr = bl.rMax * (0.55 - q * 0.35);
    if (fr > 0) {
      const g = ctx.createRadialGradient(bl.x, bl.y, 0, bl.x, bl.y, fr);
      g.addColorStop(0,   `rgba(255,255,255,${(1 - q) * 0.95})`);
      g.addColorStop(0.4, `rgba(255,213,74,${(1 - q) * 0.75})`);
      g.addColorStop(1,   'rgba(255,90,30,0)');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(bl.x, bl.y, fr, 0, TAU); ctx.fill();
    }

    // 広がる衝撃波（2重）
