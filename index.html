<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>TWIN BEAM — 上下対戦協力シューター</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%; overflow:hidden; background:#05060f;
    touch-action:none; -webkit-user-select:none; user-select:none;
    -webkit-tap-highlight-color:transparent; overscroll-behavior:none;
    font-family:-apple-system, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
  }
  #cv { display:block; position:fixed; inset:0; touch-action:none; }
  html:fullscreen, body:fullscreen { width:100%; height:100%; }
</style>
</head>
<body>
<canvas id="cv"></canvas>
<script>
'use strict';

/* ============================================================
   TWIN BEAM
   画面を上下に分割し、中央の敵を2人で挟み撃ちする協力シューター。
   - 自分側のゾーンをドラッグ → 機体が指に追従
   - 触れている間は自動連射（同時タップは pointerId で独立管理）
   - ダメージを与えるとチャージが溜まり、満タンで貫通ビームを発射
============================================================ */

const cv  = document.getElementById('cv');
const ctx = cv.getContext('2d');

let W = 0, H = 0, DPR = 1;
const Z = { top:{y0:0,y1:0}, bot:{y0:0,y1:0}, cy:0 };

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  // 全画面移行直後は innerWidth/Height の更新が遅れる端末があるため
  // visualViewport が使えるならそちらを優先する
  const vv = window.visualViewport;
  W = Math.round(vv ? vv.width  : window.innerWidth);
  H = Math.round(vv ? vv.height : window.innerHeight);
  cv.width  = Math.round(W * DPR);
  cv.height = Math.round(H * DPR);
  cv.style.width  = W + 'px';
  cv.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

  Z.top.y0 = H * 0.06;  Z.top.y1 = H * 0.37;
  Z.bot.y0 = H * 0.63;  Z.bot.y1 = H * 0.94;
  Z.cy = H / 2;
  // 全画面ボタンは中央帯の右端＝どちらのプレイヤーの操作エリアにも掛からない位置
  FS.btn.x = W - 36;
  FS.btn.y = Z.cy;

  makeStars();
  for (const p of G.players) clampPlayer(p);
  if (G.enemy) { G.enemy.x = Math.min(Math.max(G.enemy.x, W*0.2), W*0.8); }
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 200));
if (window.visualViewport) window.visualViewport.addEventListener('resize', resize);

/* ---------------- 全画面 ---------------- */
const FS = {
  supported: !!(document.documentElement.requestFullscreen ||
                document.documentElement.webkitRequestFullscreen),
  btn: { x:0, y:0, r:26 },
};

function isFullscreen() {
  return !!(document.fullscreenElement || document.webkitFullscreenElement);
}

function enterFullscreen() {
  const el = document.documentElement;
  const fn = el.requestFullscreen || el.webkitRequestFullscreen;
  if (!fn) return;
  try {
    // ブラウザによっては Promise を返さないので包んで握り潰す
    Promise.resolve(fn.call(el, { navigationUI: 'hide' })).then(lockOrientation, () => {});
  } catch (_) { /* ユーザー操作外の呼び出しなどは無視 */ }
}

function exitFullscreen() {
  const fn = document.exitFullscreen || document.webkitExitFullscreen;
  if (!fn) return;
  try { Promise.resolve(fn.call(document)).catch(() => {}); } catch (_) {}
}

function toggleFullscreen() { isFullscreen() ? exitFullscreen() : enterFullscreen(); }

function lockOrientation() {
  // 対応端末でのみ縦向き固定（非対応でも例外を出さない）
  try {
    const so = screen.orientation;
    if (so && so.lock) Promise.resolve(so.lock('portrait')).catch(() => {});
  } catch (_) {}
}

for (const ev of ['fullscreenchange', 'webkitfullscreenchange']) {
  document.addEventListener(ev, () => { resize(); setTimeout(resize, 120); });
}

/* ---------------- utils ---------------- */
const rand  = (a, b) => a + Math.random() * (b - a);
const clamp = (v, a, b) => v < a ? a : (v > b ? b : v);
const TAU = Math.PI * 2;

/* ---------------- 背景の星 ---------------- */
let stars = [];
function makeStars() {
  stars = [];
  const n = Math.round((W * H) / 9000);
  for (let i = 0; i < n; i++) {
    stars.push({ x: rand(0, W), y: rand(0, H), r: rand(0.4, 1.6), s: rand(4, 26), a: rand(0.25, 0.9) });
  }
}

/* ---------------- ゲーム状態 ---------------- */
const G = {
  mode: 'title',          // title | play | over
  t: 0,
  wave: 1,
  score: 0,
  players: [],
  bullets: [],            // プレイヤー弾
  ebullets: [],           // 敵弾
  parts: [],
  enemy: null,
  shake: 0,
  overT: 0,
  banner: null,           // {text, life}
};

const P_COLORS = [
  { main:'#31e6ff', glow:'#0af', name:'PLAYER 1' },   // 下側
  { main:'#ff5cc8', glow:'#f0a', name:'PLAYER 2' },   // 上側
];

function makePlayer(idx) {
  const bottom = idx === 0;
  return {
    idx,
    bottom,
    dirY: bottom ? -1 : 1,               // 弾の進行方向
    x: W / 2,
    y: bottom ? (Z.bot.y0 + Z.bot.y1) / 2 : (Z.top.y0 + Z.top.y1) / 2,
    tx: W / 2, ty: 0,
    hp: 100, maxHp: 100,
    charge: 0, maxCharge: 100,
    cool: 0,
    firing: false,
    down: false, respawn: 0,
    invuln: 2,
    hitFlash: 0,
    pointer: -1,
  };
}

function clampPlayer(p) {
  const z = p.bottom ? Z.bot : Z.top;
  p.x = clamp(p.x, 26, W - 26);
  p.y = clamp(p.y, z.y0, z.y1);
  p.tx = clamp(p.tx, 26, W - 26);
  p.ty = clamp(p.ty, z.y0, z.y1);
}

function makeEnemy(wave) {
  const hp = 520 + (wave - 1) * 260;
  const hue = (200 + wave * 47) % 360;
  return {
    x: W / 2, y: Z.cy,
    r: Math.min(W, H) * 0.075,
    hp, maxHp: hp,
    t: rand(0, 10),
    speed: 0.55 + wave * 0.1,
    amp: W * 0.30,
    fireT: 1.6,
    pattern: 0,
    flash: 0,
    dying: 0,
  };
}

function resetGame() {
  G.wave = 1; G.score = 0; G.t = 0;
  G.bullets.length = 0; G.ebullets.length = 0; G.parts.length = 0;
  G.players = [makePlayer(0), makePlayer(1)];
  G.enemy = makeEnemy(1);
  G.shake = 0;
  G.banner = { text: 'WAVE 1', life: 1.6 };
  pointers.clear();
}

/* ---------------- 入力（マルチタッチ） ---------------- */
/* pointerId -> playerIndex。上下ゾーンで担当プレイヤーを決めるので
   2本の指が同時に押されても互いに干渉しない。 */
const pointers = new Map();

function playerForY(y) { return y > Z.cy ? 0 : 1; }

function onDown(e) {
  e.preventDefault();

  // 全画面ボタンは最優先で判定（機体の移動・射撃には渡さない）
  if (FS.supported) {
    const dx = e.clientX - FS.btn.x, dy = e.clientY - FS.btn.y, hit = FS.btn.r + 10;
    if (dx * dx + dy * dy < hit * hit) { toggleFullscreen(); return; }
  }

  if (G.mode === 'title') {
    // 最初のタップ＝ユーザー操作なので、ここでしか全画面には入れない
    if (FS.supported && !isFullscreen()) enterFullscreen();
    resetGame(); G.mode = 'play'; return;
  }
  if (G.mode === 'over') { if (G.overT > 0.8) { resetGame(); G.mode = 'play'; } return; }

  const idx = playerForY(e.clientY);
  const p = G.players[idx];
  if (!p) return;
  // すでにその側が別の指で操作中なら、新しい指に主導権を渡す
  if (p.pointer !== -1) pointers.delete(p.pointer);
  p.pointer = e.pointerId;
  pointers.set(e.pointerId, idx);
  p.firing = true;
  p.tx = e.clientX; p.ty = e.clientY;
  clampPlayer(p);
}

function onMove(e) {
  const idx = pointers.get(e.pointerId);
  if (idx === undefined) return;
  e.preventDefault();
  const p = G.players[idx];
  // 座標がまとめて届く端末では最後の座標だけ使えば十分
  p.tx = e.clientX; p.ty = e.clientY;
  clampPlayer(p);
}

function onUp(e) {
  const idx = pointers.get(e.pointerId);
  if (idx === undefined) return;
  e.preventDefault();
  const p = G.players[idx];
  p.firing = false;
  p.pointer = -1;
  pointers.delete(e.pointerId);
}

cv.addEventListener('pointerdown',   onDown,  { passive:false });
cv.addEventListener('pointermove',   onMove,  { passive:false });
cv.addEventListener('pointerup',     onUp,    { passive:false });
cv.addEventListener('pointercancel', onUp,    { passive:false });
cv.addEventListener('pointerleave',  onUp,    { passive:false });
cv.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('touchmove', e => e.preventDefault(), { passive:false });

/* ---------------- エフェクト ---------------- */
function burst(x, y, color, n, spd, size) {
  for (let i = 0; i < n; i++) {
    const a = rand(0, TAU), s = rand(spd * 0.3, spd);
    G.parts.push({
      x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
      life: rand(0.25, 0.7), max: 0.7, color, size: rand(size * 0.5, size),
    });
  }
}

/* ---------------- 弾 ---------------- */
function playerShoot(p) {
  const big = p.charge >= p.maxCharge;
  const c = P_COLORS[p.idx];
  if (big) {
    p.charge = 0;
    G.bullets.push({ x:p.x, y:p.y + p.dirY*20, vy: p.dirY*1500, r:20, dmg:110, owner:p.idx, pierce:true, color:c.main });
    burst(p.x, p.y + p.dirY * 20, c.main, 18, 320, 6);
    G.shake = Math.max(G.shake, 8);
    p.cool = 0.42;
  } else {
    for (const off of [-11, 11]) {
      G.bullets.push({ x:p.x+off, y:p.y + p.dirY*18, vy: p.dirY*1150, r:5, dmg:8, owner:p.idx, pierce:false, color:c.main });
    }
    p.cool = 0.115;
  }
}

function enemyShoot(en) {
  const alive = G.players.filter(p => !p.down);
  if (!alive.length) return;
  const pat = en.pattern;
  const spd = 260 + G.wave * 26;

  const push = (ang, s, r, dmg) => {
    G.ebullets.push({ x:en.x, y:en.y, vx:Math.cos(ang)*s, vy:Math.sin(ang)*s, r:r||8, dmg:dmg||12, t:0 });
  };

  if (pat === 0) {
    // 狙い撃ち（生存プレイヤー全員に3way）
    for (const p of alive) {
      const base = Math.atan2(p.y - en.y, p.x - en.x);
      for (const d of [-0.16, 0, 0.16]) push(base + d, spd * 1.15, 8, 12);
    }
  } else if (pat === 1) {
    // 全方位ばらまき
    const n = 12 + G.wave;
    const off = rand(0, TAU);
    for (let i = 0; i < n; i++) push(off + i / n * TAU, spd * 0.8, 9, 14);
  } else if (pat === 2) {
    // 上下へ扇状の弾幕
    for (const dir of [-1, 1]) {
      for (let i = -3; i <= 3; i++) {
        push(dir > 0 ? Math.PI/2 + i*0.19 : -Math.PI/2 + i*0.19, spd, 7, 10);
      }
    }
  } else {
    // 回転レーザー粒
    for (let k = 0; k < 3; k++) {
      const a = en.t * 2.2 + k / 3 * TAU;
      push(a, spd * 1.3, 6, 9);
      push(a + Math.PI, spd * 1.3, 6, 9);
    }
  }
  en.fireT = Math.max(0.42, 1.35 - G.wave * 0.075) * rand(0.85, 1.2);
  en.pattern = (Math.random() < 0.45) ? (en.pattern + 1) % 4 : Math.floor(rand(0, 4));
}

/* ---------------- 更新 ---------------- */
function update(dt) {
  G.t += dt;
  G.shake *= Math.pow(0.02, dt);
  if (G.banner) { G.banner.life -= dt; if (G.banner.life <= 0) G.banner = null; }

  for (const s of stars) { s.y += s.s * dt; if (s.y > H) { s.y = 0; s.x = rand(0, W); } }

  if (G.mode !== 'play') { if (G.mode === 'over') G.overT += dt; updateParts(dt); return; }

  /* --- プレイヤー --- */
  for (const p of G.players) {
    p.hitFlash = Math.max(0, p.hitFlash - dt * 3);
    p.invuln = Math.max(0, p.invuln - dt);

    if (p.down) {
      p.respawn -= dt;
      if (p.respawn <= 0) {
        p.down = false; p.hp = 60; p.invuln = 2.5; p.charge = 0;
        burst(p.x, p.y, P_COLORS[p.idx].main, 26, 240, 5);
        G.banner = { text: P_COLORS[p.idx].name + ' REVIVED', life: 1.2 };
      }
      continue;
    }

    // 指の位置へ滑らかに追従（そのままだとカクつくので補間）
    if (p.pointer !== -1) {
      const k = 1 - Math.pow(0.0000015, dt);
      p.x += (p.tx - p.x) * k;
      p.y += (p.ty - p.y) * k;
      clampPlayer(p);
    }

    p.cool -= dt;
    if (p.firing && p.cool <= 0) playerShoot(p);
  }

  /* --- 敵 --- */
  const en = G.enemy;
  if (en) {
    en.t += dt;
    en.flash = Math.max(0, en.flash - dt * 4);
    en.x = W/2 + Math.sin(en.t * en.speed) * en.amp * (0.6 + 0.4*Math.sin(en.t*0.31));
    en.y = Z.cy + Math.sin(en.t * 1.6) * H * 0.035;
    en.fireT -= dt;
    if (en.fireT <= 0) enemyShoot(en);
  }

  /* --- プレイヤー弾 --- */
  for (let i = G.bullets.length - 1; i >= 0; i--) {
    const b = G.bullets[i];
    b.y += b.vy * dt;
    if (b.y < -40 || b.y > H + 40) { G.bullets.splice(i, 1); continue; }
    if (en && en.hp > 0) {
      const dx = b.x - en.x, dy = b.y - en.y;
      if (dx*dx + dy*dy < (en.r + b.r) * (en.r + b.r)) {
        en.hp -= b.dmg; en.flash = 1;
        G.score += Math.round(b.dmg);
        const p = G.players[b.owner];
        p.charge = Math.min(p.maxCharge, p.charge + b.dmg * 0.55);
        burst(b.x, b.y, b.color, b.pierce ? 14 : 5, b.pierce ? 300 : 150, b.pierce ? 6 : 3.5);
        if (!b.pierce) G.bullets.splice(i, 1);
        if (en.hp <= 0) { defeatEnemy(en); break; }
      }
    }
  }

  /* --- 敵弾 --- */
  for (let i = G.ebullets.length - 1; i >= 0; i--) {
    const e = G.ebullets[i];
    e.t += dt;
    e.x += e.vx * dt; e.y += e.vy * dt;
    if (e.x < -40 || e.x > W + 40 || e.y < -40 || e.y > H + 40) { G.ebullets.splice(i, 1); continue; }
    for (const p of G.players) {
      if (p.down || p.invuln > 0) continue;
      const dx = e.x - p.x, dy = e.y - p.y, rr = e.r + 15;
      if (dx*dx + dy*dy < rr*rr) {
        p.hp -= e.dmg; p.hitFlash = 1;
        G.shake = Math.max(G.shake, 6);
        burst(e.x, e.y, '#ff9a3c', 10, 200, 4);
        G.ebullets.splice(i, 1);
        if (p.hp <= 0) downPlayer(p);
        break;
      }
    }
  }

  updateParts(dt);
}

function updateParts(dt) {
  for (let i = G.parts.length - 1; i >= 0; i--) {
    const p = G.parts[i];
    p.life -= dt;
    if (p.life <= 0) { G.parts.splice(i, 1); continue; }
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vx *= Math.pow(0.15, dt); p.vy *= Math.pow(0.15, dt);
  }
}

function downPlayer(p) {
  p.hp = 0; p.down = true; p.respawn = 5; p.firing = false; p.charge = 0;
  burst(p.x, p.y, P_COLORS[p.idx].main, 40, 420, 7);
  G.shake = Math.max(G.shake, 16);
  if (G.players.every(q => q.down)) {
    G.mode = 'over'; G.overT = 0;
  } else {
    G.banner = { text: P_COLORS[p.idx].name + ' DOWN — 5s', life: 1.6 };
  }
}

function defeatEnemy(en) {
  G.score += 1000 * G.wave;
  burst(en.x, en.y, '#fff', 70, 620, 9);
  burst(en.x, en.y, '#ffb300', 50, 420, 12);
  G.shake = 26;
  G.ebullets.length = 0;
  G.enemy = null;
  G.wave++;
  for (const p of G.players) if (!p.down) p.hp = Math.min(p.maxHp, p.hp + 30);
  G.banner = { text: 'WAVE ' + G.wave, life: 1.8 };
  setTimeout(() => { if (G.mode === 'play') G.enemy = makeEnemy(G.wave); }, 1500);
}

/* ---------------- 描画 ---------------- */
function draw() {
  ctx.save();
  if (G.shake > 0.3) ctx.translate(rand(-G.shake, G.shake), rand(-G.shake, G.shake));

  // 背景
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0,   '#120a22');
  g.addColorStop(0.5, '#05060f');
  g.addColorStop(1,   '#02141f');
  ctx.fillStyle = g; ctx.fillRect(-40, -40, W + 80, H + 80);

  ctx.fillStyle = '#ffffff';
  for (const s of stars) { ctx.globalAlpha = s.a * 0.7; ctx.fillRect(s.x, s.y, s.r, s.r); }
  ctx.globalAlpha = 1;

  drawArena();

  if (G.mode !== 'title') {
    if (G.enemy) drawEnemy(G.enemy);
    for (const b of G.bullets) drawBullet(b);
    for (const e of G.ebullets) drawEBullet(e);
    for (const p of G.players) if (!p.down) drawShip(p);
    drawParts();
    drawHUD();
  } else {
    drawParts();
  }

  ctx.restore();

  if (G.mode === 'title') drawTitle();
  if (G.mode === 'over')  drawOver();
  if (G.banner) drawBanner(G.banner);
  drawFsButton();   // オーバーレイに隠れず、画面揺れの影響も受けないよう最後に描く
}

function drawArena() {
  // 中央帯（敵ゾーン）
  ctx.save();
  const bandH = H * 0.2;
  const bg = ctx.createLinearGradient(0, Z.cy - bandH, 0, Z.cy + bandH);
  bg.addColorStop(0, 'rgba(255,255,255,0)');
  bg.addColorStop(0.5, 'rgba(255,120,60,0.07)');
  bg.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = bg;
  ctx.fillRect(0, Z.cy - bandH, W, bandH * 2);

  ctx.strokeStyle = 'rgba(255,255,255,0.10)';
  ctx.lineWidth = 1;
  ctx.setLineDash([12, 10]);
  for (const y of [Z.cy - bandH * 0.55, Z.cy + bandH * 0.55]) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  ctx.setLineDash([]);

  // 各プレイヤーの操作可能ゾーン枠
  for (let i = 0; i < 2; i++) {
    const z = i === 0 ? Z.bot : Z.top;
    ctx.strokeStyle = P_COLORS[i].main;
    ctx.globalAlpha = 0.14;
    ctx.lineWidth = 2;
    roundRect(ctx, 14, z.y0 - 12, W - 28, (z.y1 - z.y0) + 24, 18);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
  ctx.restore();
}

function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.arcTo(x + w, y, x + w, y + h, r);
  c.arcTo(x + w, y + h, x, y + h, r);
  c.arcTo(x, y + h, x, y, r);
  c.arcTo(x, y, x + w, y, r);
  c.closePath();
}

function drawShip(p) {
  const c = P_COLORS[p.idx];
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.scale(1, p.bottom ? 1 : -1);   // 上側プレイヤーは上下反転

  if (p.invuln > 0 && Math.floor(p.invuln * 12) % 2 === 0) ctx.globalAlpha = 0.35;

  // エンジン炎
  const flame = 12 + Math.sin(G.t * 30) * 4;
  const fg = ctx.createLinearGradient(0, 14, 0, 14 + flame);
  fg.addColorStop(0, c.main); fg.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = fg;
  ctx.beginPath(); ctx.moveTo(-7, 14); ctx.lineTo(7, 14); ctx.lineTo(0, 14 + flame); ctx.closePath(); ctx.fill();

  ctx.shadowColor = c.glow; ctx.shadowBlur = 18;
  ctx.fillStyle = p.hitFlash > 0 ? '#fff' : c.main;
  ctx.beginPath();
  ctx.moveTo(0, -20); ctx.lineTo(14, 10); ctx.lineTo(6, 6);
  ctx.lineTo(0, 13);  ctx.lineTo(-6, 6); ctx.lineTo(-14, 10);
  ctx.closePath(); ctx.fill();

  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath(); ctx.arc(0, -4, 3.6, 0, TAU); ctx.fill();

  // チャージ満タンのオーラ
  if (p.charge >= p.maxCharge) {
    ctx.strokeStyle = '#fff';
    ctx.globalAlpha = 0.4 + 0.4 * Math.sin(G.t * 14);
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, 0, 26 + Math.sin(G.t * 10) * 3, 0, TAU); ctx.stroke();
  }
  ctx.restore();
}

function drawEnemy(en) {
  ctx.save();
  ctx.translate(en.x, en.y);
  const hue = (200 + G.wave * 47) % 360;
  const col = `hsl(${hue},90%,62%)`;

  ctx.shadowColor = col; ctx.shadowBlur = 30;
  ctx.fillStyle = en.flash > 0 ? '#fff' : col;

  // 回転するコア
  ctx.save();
  ctx.rotate(en.t * 0.7);
  ctx.beginPath();
  const spikes = 6 + (G.wave % 4);
  for (let i = 0; i < spikes * 2; i++) {
    const r = i % 2 === 0 ? en.r : en.r * 0.55;
    const a = i / (spikes * 2) * TAU;
    ctx[i ? 'lineTo' : 'moveTo'](Math.cos(a) * r, Math.sin(a) * r);
  }
  ctx.closePath(); ctx.fill();
  ctx.restore();

  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(10,0,20,0.85)';
  ctx.beginPath(); ctx.arc(0, 0, en.r * 0.4, 0, TAU); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.globalAlpha = 0.7 + 0.3 * Math.sin(en.t * 6);
  ctx.beginPath(); ctx.arc(0, 0, en.r * 0.2, 0, TAU); ctx.fill();
  ctx.globalAlpha = 1;
  ctx.restore();

  // 敵HPバー（画面幅いっぱい・中央）
  const bw = W * 0.7, bx = (W - bw) / 2, by = Z.cy - H * 0.115;
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  roundRect(ctx, bx, by, bw, 8, 4); ctx.fill();
  ctx.fillStyle = col;
  roundRect(ctx, bx, by, bw * Math.max(0, en.hp / en.maxHp), 8, 4); ctx.fill();
}

function drawBullet(b) {
  ctx.save();
  ctx.shadowColor = b.color; ctx.shadowBlur = b.pierce ? 30 : 12;
  ctx.fillStyle = b.color;
  if (b.pierce) {
    ctx.globalAlpha = 0.9;
    ctx.fillRect(b.x - b.r, Math.min(b.y, b.y + b.vy * 0.05), b.r * 2, Math.abs(b.vy * 0.05));
    ctx.fillStyle = '#fff';
    ctx.fillRect(b.x - b.r * 0.35, Math.min(b.y, b.y + b.vy * 0.05), b.r * 0.7, Math.abs(b.vy * 0.05));
  } else {
    ctx.beginPath(); ctx.ellipse(b.x, b.y, b.r * 0.7, b.r * 2.2, 0, 0, TAU); ctx.fill();
  }
  ctx.restore();
}

function drawEBullet(e) {
  ctx.save();
  ctx.shadowColor = '#ff7a2f'; ctx.shadowBlur = 14;
  ctx.fillStyle = '#ffd08a';
  ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, TAU); ctx.fill();
  ctx.fillStyle = '#ff4d1a';
  ctx.beginPath(); ctx.arc(e.x, e.y, e.r * 0.55, 0, TAU); ctx.fill();
  ctx.restore();
}

function drawFsButton() {
  if (!FS.supported) return;
  const b = FS.btn, full = isFullscreen();
  ctx.save();
  ctx.translate(b.x, b.y);

  ctx.globalAlpha = G.mode === 'play' ? 0.35 : 0.75;
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath(); ctx.arc(0, 0, b.r, 0, TAU); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.45)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(0, 0, b.r, 0, TAU); ctx.stroke();

  // 全画面=外向きの隅アイコン / 解除=内向き
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2.2;
  ctx.lineCap = 'round';
  // 全画面へ: 外側の四隅に枠 / 解除: 中央寄りの隅から外へ伸びる
  const o = full ? 4 : 11, len = 7, inward = full ? -1 : 1;
  for (const sx of [-1, 1]) for (const sy of [-1, 1]) {
    const cx = sx * o, cy = sy * o;
    ctx.beginPath();
    ctx.moveTo(cx - sx * len * inward, cy);
    ctx.lineTo(cx, cy);
    ctx.lineTo(cx, cy - sy * len * inward);
    ctx.stroke();
  }
  ctx.restore();
}

function drawParts() {
  ctx.save();
  for (const p of G.parts) {
    ctx.globalAlpha = Math.max(0, p.life / p.max);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.restore();
}

/* --- HUD --- */
function drawHUD() {
  for (const p of G.players) drawPlayerHUD(p);

  // 中央のスコア／WAVE（両側から読めるよう2方向に描画）
  for (const flip of [0, 1]) {
    ctx.save();
    ctx.translate(W / 2, Z.cy + (flip ? -1 : 1) * H * 0.145);
    if (flip) ctx.rotate(Math.PI);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.font = '600 13px system-ui, sans-serif';
    ctx.fillText(`WAVE ${G.wave}   SCORE ${G.score}`, 0, 0);
    ctx.restore();
  }
}

function drawPlayerHUD(p) {
  const c = P_COLORS[p.idx];
  const barW = Math.min(W * 0.42, 300), barH = 12;
  const y = p.bottom ? H - 34 : 22;

  ctx.save();
  ctx.translate(W / 2, y);
  if (!p.bottom) ctx.rotate(Math.PI);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  // HP
  ctx.fillStyle = 'rgba(255,255,255,0.13)';
  roundRect(ctx, -barW / 2, -barH / 2, barW, barH, 6); ctx.fill();
  ctx.fillStyle = p.hp > 35 ? c.main : '#ff4d5e';
  roundRect(ctx, -barW / 2, -barH / 2, barW * clamp(p.hp / p.maxHp, 0, 1), barH, 6); ctx.fill();

  // チャージ
  const cy2 = barH / 2 + 7;
  ctx.fillStyle = 'rgba(255,255,255,0.10)';
  roundRect(ctx, -barW / 2, cy2, barW, 5, 3); ctx.fill();
  ctx.fillStyle = p.charge >= p.maxCharge ? '#fff' : 'rgba(255,255,255,0.55)';
  roundRect(ctx, -barW / 2, cy2, barW * (p.charge / p.maxCharge), 5, 3); ctx.fill();

  ctx.fillStyle = c.main;
  ctx.font = '700 12px system-ui, sans-serif';
  ctx.fillText(p.down ? `RESPAWN ${p.respawn.toFixed(1)}` : c.name, 0, -barH - 8);
  ctx.restore();
}

function drawBanner(b) {
  const a = Math.min(1, b.life * 2.2);
  for (const flip of [0, 1]) {
    ctx.save();
    ctx.globalAlpha = a;
    ctx.translate(W / 2, Z.cy + (flip ? -1 : 1) * H * 0.22);
    if (flip) ctx.rotate(Math.PI);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.shadowColor = '#7cf'; ctx.shadowBlur = 20;
    ctx.font = '800 30px system-ui, sans-serif';
    ctx.fillText(b.text, 0, 0);
    ctx.restore();
  }
}

function drawTitle() {
  ctx.save();
  ctx.fillStyle = 'rgba(3,4,12,0.72)';
  ctx.fillRect(0, 0, W, H);
  for (const flip of [0, 1]) {
    ctx.save();
    ctx.translate(W / 2, flip ? H * 0.27 : H * 0.73);
    if (flip) ctx.rotate(Math.PI);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

    ctx.fillStyle = '#fff';
    ctx.shadowColor = '#31e6ff'; ctx.shadowBlur = 26;
    ctx.font = '900 46px system-ui, sans-serif';
    ctx.fillText('TWIN BEAM', 0, -46);
    ctx.shadowBlur = 0;

    ctx.fillStyle = 'rgba(255,255,255,0.78)';
    ctx.font = '600 15px system-ui, sans-serif';
    ctx.fillText('自分側のエリアを指でなぞって移動 / 触れている間は連射', 0, 6);
    ctx.fillText('ダメージでチャージが溜まると自動で貫通ビーム', 0, 30);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText('2人同時プレイ対応 — 上側と下側を別々の指で操作できます', 0, 54);
    ctx.fillText(FS.supported
      ? 'タップで全画面になります（右端のボタンでいつでも切替）'
      : 'ブラウザの「ホーム画面に追加」から起動すると全画面になります', 0, 74);

    ctx.fillStyle = '#fff';
    ctx.globalAlpha = 0.55 + 0.45 * Math.sin(G.t * 4);
    ctx.font = '800 20px system-ui, sans-serif';
    ctx.fillText('TAP TO START', 0, 110);
    ctx.restore();
  }
  ctx.restore();
}

function drawOver() {
  ctx.save();
  ctx.fillStyle = 'rgba(20,0,8,0.75)';
  ctx.fillRect(0, 0, W, H);
  for (const flip of [0, 1]) {
    ctx.save();
    ctx.translate(W / 2, flip ? H * 0.3 : H * 0.7);
    if (flip) ctx.rotate(Math.PI);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ff5c6e';
    ctx.shadowColor = '#f03'; ctx.shadowBlur = 24;
    ctx.font = '900 42px system-ui, sans-serif';
    ctx.fillText('GAME OVER', 0, -30);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.font = '700 22px system-ui, sans-serif';
    ctx.fillText(`WAVE ${G.wave}   SCORE ${G.score}`, 0, 14);
    if (G.overT > 0.8) {
      ctx.globalAlpha = 0.5 + 0.5 * Math.sin(G.t * 4);
      ctx.font = '700 17px system-ui, sans-serif';
      ctx.fillText('TAP TO RETRY', 0, 52);
    }
    ctx.restore();
  }
  ctx.restore();
}

/* ---------------- メインループ ---------------- */
let last = performance.now();
function frame(now) {
  let dt = (now - last) / 1000;
  last = now;
  if (dt > 0.05) dt = 0.05;      // タブ復帰時の飛びを抑制
  update(dt);
  draw();
  requestAnimationFrame(frame);
}

resize();
G.players = [makePlayer(0), makePlayer(1)];
requestAnimationFrame(frame);
</script>
</body>
